name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      # postgis/postgis:16-3.4 service container for `dbt parse` + the
      # pgTAP runner. Drop-in replacement for postgres:16: same port, same
      # ci/ci credentials, same health-check. The PostGIS bump is for
      # sprint-09's `gold.fn_assess_polygon` pgTAP tests, which exercise
      # spatial operators (ST_Transform / ST_Intersects / ST_DWithin).
      # Activity 9 (sprint-08) lands the runner empty — sprint-09 fills
      # tests/sql/*.sql.
      # DB name is `house4house` (not `ci`) to match the hardcoded
      # `database: house4house` in dbt source YAMLs — PostgreSQL doesn't
      # support cross-database refs, so `dbt build` would fail otherwise.
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: house4house
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install dependencies
        run: uv sync --all-packages

      - name: ruff check
        run: |
          echo "::group::ruff"
          uv run ruff check --output-format=github
          echo "::endgroup::"

      - name: ruff format --check
        run: |
          echo "::group::ruff-format"
          uv run ruff format --check
          echo "::endgroup::"

      - name: pytest
        env:
          AIRFLOW_HOME: ${{ github.workspace }}/.airflow-home
        run: |
          mkdir -p $AIRFLOW_HOME
          echo "::group::pytest"
          uv run pytest -q tests/
          echo "::endgroup::"

      # ── pgTAP CI plumbing (Sprint-08 Activity 9, 2026-05-15) ──
      # Three steps: install pgTAP into the postgres service, install
      # pg_prove on the runner, run any tests/sql/*.sql files (green when
      # the directory is empty — sprint-09 adds the fn_assess_polygon
      # tests #2-#6 from /plan-eng-review Appendix C).
      - name: Install pgTAP into postgres service
        run: |
          echo "::group::pgtap-install"
          docker exec ${{ job.services.postgres.id }} bash -c \
            "apt-get update -q && apt-get install -y postgresql-16-pgtap"
          PGPASSWORD=ci psql -h localhost -U ci -d house4house \
            -c "CREATE EXTENSION IF NOT EXISTS pgtap"
          echo "::endgroup::"

      - name: Install pg_prove (test runner)
        run: |
          echo "::group::pg-prove-install"
          sudo apt-get update -q
          sudo apt-get install -y libtap-parser-sourcehandler-pgtap-perl
          pg_prove --version
          echo "::endgroup::"

      # pg_prove step moved AFTER `dbt build (structural)` below (sprint-09 WS4
      # 2026-06-03): new tests reference silver_geo.floodplains / .aquifers /
      # .geology + silver_market.ine_indicators_long, which don't exist until
      # `dbt build` materializes them. SCE clustering tests are fixture-driven
      # (BEGIN/ROLLBACK + TEMP tables) and would have worked either way; the
      # new silver-invariant tests need the silver tables to be queryable.

      - name: ty check (advisory)
        run: |
          echo "::group::ty"
          # --exit-zero: advisory mode (CI green regardless of findings).
          # --output-format=github: PR diff annotations.
          # Graduation to BLOCKING: see TODOS.md "Graduate ty" entry — three
          # concrete triggers (ty 1.0, [tool.ty] config, or Phase 6.5 sweep PR).
          uv run ty check --output-format=github --exit-zero
          echo "::endgroup::"

      - name: dbt parse
        env:
          AIRFLOW_HOME: ${{ github.workspace }}/.airflow-home
          # Point dbt at the postgres service container above. The `ci:`
          # target in dbt/profiles.yml reads these env vars.
          DBT_PROFILES_DIR: ${{ github.workspace }}/dbt
          DBT_HOST: localhost
          DBT_PORT: 5432
          DBT_USER: ci
          DBT_PASSWORD: ci
          DBT_DB: house4house
        shell: bash
        run: |
          # set -o pipefail preserves dbt's exit code through the `tee`
          # pipe. Without it, `tee` always exits 0 and a real dbt failure
          # would produce a green CI run.
          set -o pipefail
          mkdir -p $AIRFLOW_HOME
          # `dbt deps` populates dbt_packages/ from packages.yml. `dbt parse`
          # fails compilation if a declared package is missing, so deps must
          # run first. Cheap (~2-3s for dbt-utils only).
          echo "::group::dbt-deps"
          uv run dbt deps --project-dir dbt
          echo "::endgroup::"
          echo "::group::dbt-parse"
          uv run dbt parse \
            --project-dir dbt \
            --target ci \
            --no-partial-parse 2>&1 \
            | tee dbt-parse.log
          dbt_exit=$?
          echo "::endgroup::"
          # Post-process the log into GitHub annotations regardless of
          # pass/fail. The `[dbt-parse]` tag groups them alongside other
          # tools' annotations on the PR diff (per devex-review G5).
          python -c "
          import sys
          with open('dbt-parse.log') as f:
              for line in f:
                  if 'Error' in line or 'Compilation' in line:
                      print(f'::error file=dbt::[dbt-parse] {line.rstrip()}')
          "
          exit $dbt_exit

      # ── Tier-1 dbt build (Sprint-09 Slice B, 2026-05-17) ──
      # Structural validation: catches SQL/type/JOIN errors that `dbt parse`
      # misses. Bootstraps empty bronze tables from tests/ci_bootstrap/*.sql
      # (one file per source family; see directory README), then runs
      # `dbt build` on the v1-wedge silver path. Schema tests run against
      # empty tables — trivially pass; they fire meaningfully when
      # Tier-2 (sprint-10, seed-based data) lands. Per-PR additive: each
      # sprint-09 PR contributes the bronze stubs + model selectors it needs.
      - name: Bootstrap bronze schemas
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: ci
          PGPASSWORD: ci
          PGDATABASE: house4house
        shell: bash
        run: |
          echo "::group::bronze-bootstrap"
          shopt -s nullglob
          files=(tests/ci_bootstrap/*.sql)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No tests/ci_bootstrap/*.sql files — skipping bronze bootstrap"
          else
            for f in "${files[@]}"; do
              echo "→ $f"
              psql -h "$PGHOST" -U "$PGUSER" -d "$PGDATABASE" -f "$f"
            done
          fi
          echo "::endgroup::"

      - name: dbt build (structural)
        env:
          AIRFLOW_HOME: ${{ github.workspace }}/.airflow-home
          DBT_PROFILES_DIR: ${{ github.workspace }}/dbt
          DBT_HOST: localhost
          DBT_PORT: 5432
          DBT_USER: ci
          DBT_PASSWORD: ci
          DBT_DB: house4house
        shell: bash
        run: |
          set -o pipefail
          echo "::group::dbt-build-slice-b"
          # Slice B + B-prime path + sprint-09 WS4 quick-wins:
          #   silver_sce_buildings, silver_unified_developments,
          #   floodplains (APA), aquifers + geology (LNEG), ine_indicators_long
          # and everything upstream (stg_sce_certificates, the 4 stg_portal_developments_*,
          # dim_geography, dim_constraint_severity, stg_apa_arpsi, stg_lneg_*, stg_ine_indicators).
          # Bronze tables are empty (Tier-1 — Tier-2 in sprint-10 seeds fixtures).
          # --indirect-selection cautious: only run tests whose parents are ALL in the
          # selection. Without it, building dim_geography would pull in the
          # unified_listings→dim_geography relationships test, which queries an
          # unbuilt unified_listings and fails.
          uv run dbt build \
            --project-dir dbt \
            --target ci \
            --select +silver_sce_buildings +silver_unified_developments +floodplains +aquifers +geology +ine_indicators_long \
            --indirect-selection cautious \
            --no-partial-parse
          echo "::endgroup::"

      # pg_prove (moved here 2026-06-03 — runs after dbt build so the new
      # silver-invariant tests can query silver_geo.* + silver_market.* tables).
      # Empty bronze (Tier-1) means silvers are empty too; the assertions are
      # invariant-shaped (COUNT(*) WHERE NOT condition = 0) and trivially pass.
      - name: pg_prove
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: ci
          PGPASSWORD: ci
          PGDATABASE: house4house
        shell: bash
        run: |
          echo "::group::pg-prove"
          shopt -s nullglob
          files=(tests/sql/*.sql)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No tests/sql/*.sql files yet"
          else
            pg_prove --verbose "${files[@]}"
          fi
          echo "::endgroup::"
