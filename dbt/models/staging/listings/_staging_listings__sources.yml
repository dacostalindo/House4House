version: 2

sources:
  - name: bronze_listings
    database: house4house
    schema: bronze_listings
    tables:
      - name: raw_idealista
        description: "Idealista property listings. Source-oriented raw bronze. Loaded by idealista_bronze_dag."
        columns:
          - name: property_url
            description: "Full Idealista property URL — used as unique listing identifier"
          - name: property_price
            description: "Raw price string, e.g. '350.000 €' — parsed in silver"
          - name: _scrape_date
            description: "Date the row was scraped"
          - name: _operation
            description: "'sale' or 'rent'"

      - name: reverse_geocoded
        description: >
          Reverse geocoded address data from Nominatim, keyed by (latitude, longitude).
          Incrementally populated by the reverse_geocode task in idealista_bronze_dag.

      - name: image_classifications
        description: >
          Claude Vision image classifications. 1 row per property_id.
          Render detection, condition assessment (4 levels), finish quality (4 levels).
          Populated by image_classification_dag.
        columns:
          - name: property_id
            description: "FK to raw_idealista.property_id — UNIQUE constraint"
          - name: condition_label
            description: "needs_full_renovation | needs_cosmetic_update | move_in_ready | recently_renovated"
          - name: finish_quality
            description: "basic | standard | premium | luxury"

      - name: floor_plan_extractions
        description: >
          Claude Vision floor plan extractions. 1 row per plan image.
          Room-level areas, typology, floor label.
          Populated by image_classification_dag.
        columns:
          - name: property_id
            description: "FK to raw_idealista.property_id — multiple rows per property (multi-floor)"
          - name: rooms
            description: "JSONB mapping canonical room names to area in m²"

      # ────────────────────────────────────────────────────────────────────
      # RE/MAX portal — loaded by remax_dlt DAG (Tuesdays 06:00 UTC)
      # See pipelines/portals/remax/README.md for ingestion details.
      # ────────────────────────────────────────────────────────────────────

      - name: remax_developments
        description: >
          RE/MAX SCD2 development facts (~615 rows). One row per (development_id,
          version) — version boundaries detected via row_hash diff over curated
          columns (see DEVELOPMENTS_VERSION_COLUMNS in
          pipelines/portals/remax/source.py). PK: development_id.
          Active version identified by _dlt_valid_to IS NULL.
          Source: POST /api/Development/PaginatedSearch (Pass 1).
        columns:
          - name: development_id
            description: "RE/MAX development primary key. Stable across runs."
            # Source: dev.id | type=bigint, not_null, distinct=606
          - name: name
            description: "Display name of the development."
            # Source: dev.name | type=varchar
          - name: slug
            description: "URL-friendly slug used in RE/MAX listing URLs."
            # Source: dev.nameToSort | type=varchar
          - name: latitude
            description: "Latitude in WGS84. Excluded from row_hash — treated as immutable physical attribute (changes here are data corrections, not real events)."
            # Source: dev.latitude | type=double, ~1% null
          - name: longitude
            description: "Longitude in WGS84. Same row_hash exclusion as latitude."
            # Source: dev.longitude | type=double, ~1% null
          - name: minimum_price
            description: "Cheapest active unit price in the development, in EUR. IN row_hash — price changes trigger a new SCD2 version."
            # Source: dev.minimumPrice | type=double
          - name: region_name1
            description: "Top-level region (country / macro region). Hierarchy: 1 (broadest) → 3 (narrowest). Excluded from row_hash."
            # Source: dev.regionName1 | type=varchar, distinct=17
          - name: region_name2
            description: "Concelho-level region name. Excluded from row_hash."
            # Source: dev.regionName2 | type=varchar, distinct=109
          - name: region_name3
            description: "Freguesia-level region name. Excluded from row_hash."
            # Source: dev.regionName3 | type=varchar, distinct=271
          - name: zip_code
            description: "Portuguese postal code (NNNN-NNN format)."
            # Source: dev.zipCode | type=varchar, ~1% null
          - name: listings_count
            description: "Number of listings (units) advertised within this development. IN row_hash — count changes trigger new version (units sold/added)."
            # Source: dev.listingsCount (defaulted to 0) | type=bigint
          - name: office_name
            description: "Selling RE/MAX office display name."
            # Source: dev.officeName | type=varchar, distinct=164
          - name: office_id
            description: "RE/MAX office identifier."
            # Source: dev.officeID | type=bigint
          - name: agent_name
            description: "Listing agent display name. ~3% null when not set on portal."
            # Source: dev.userName | type=varchar
          - name: agent_phone
            description: "Listing agent contact phone (Portuguese format). ~3% null."
            # Source: dev.userCellPhone | type=varchar
          - name: description
            description: "Free-text marketing description. Extracted from descBodies[0].description in the raw payload."
            # Source: dev.descBodies[0].description (parsed) | type=varchar
          - name: publish_date
            description: "Original publish timestamp on RE/MAX (when the development was first listed)."
            # Source: dev.publishDate | type=timestamptz
          - name: is_special
            description: "RE/MAX 'special' / featured flag. IN row_hash — toggle triggers new version."
            # Source: dev.isSpecial (cast to bool) | type=boolean
          - name: is_special_exclusive
            description: "RE/MAX 'exclusive special' flag. IN row_hash."
            # Source: dev.isSpecialExclusive (cast to bool) | type=boolean
          - name: building_pictures
            description: "Array of image URLs for the development. JSON-typed (kept as JSONB rather than flattened to a child table per dlt issue #3811). Excluded from row_hash — Next.js may reorder between calls."
            # Source: dev.buildingPictures | type=jsonb
          - name: raw_json
            description: "Full upstream record from /api/Development/PaginatedSearch. Excluded from row_hash. Use as fallback for fields not yet promoted to typed columns."
            # Source: full dev payload | type=jsonb
          - name: row_hash
            description: "SHA256 hash over DEVELOPMENTS_VERSION_COLUMNS values (minimum_price, listings_count, is_special, is_special_exclusive). Drives SCD2 diff detection. dlt-managed."
            # Internal | type=varchar, not_null
          - name: _dlt_valid_from
            description: "SCD2 active-from timestamp (when this version became current). dlt-managed."
            # Internal | type=timestamptz
          - name: _dlt_valid_to
            description: "SCD2 active-to timestamp. NULL = currently-active version; non-NULL = retired version. dlt-managed."
            # Internal | type=timestamptz
          - name: _dlt_load_id
            description: "dlt load batch identifier — which run produced this version."
            # Internal | type=varchar, not_null
          - name: _dlt_id
            description: "dlt internal row identifier."
            # Internal | type=varchar, not_null

      - name: remax_developments_state
        description: >
          UPSERT heartbeat sidecar for remax_developments. One row per
          development_id with last_seen_date. Drives active-development
          detection in silver (last_seen_date >= current_date - 21).

      - name: remax_listings
        description: >
          RE/MAX SCD2 listing facts (~8,645 rows). PK: listing_id. Pass 1
          (PaginatedSearch) + Pass 2 (Next.js detail) for online listings.
          Excluded from row_hash: gallery, listing_rooms, listing_pictures,
          raw_json, market_days, previous_price, immutable physical attrs.
          Source: POST /api/Development/PaginatedSearch (Pass 1) +
          GET /_next/data/{buildId}/.../{slug}.json (Pass 2 detail).
        columns:
          - name: listing_id
            description: "RE/MAX listing primary key. Stable across runs."
            # Source: unit.id | type=bigint, not_null
          - name: development_id
            description: "FK to remax_developments. Each listing belongs to a development."
            # Source: parent dev_id | type=bigint
          - name: listing_price
            description: "Asking price in EUR. IN row_hash. Falls back to NULL when 0."
            # Source: unit.listingPrice | type=double
          - name: total_area
            description: "Total area (m²) including non-livable spaces. IN row_hash."
            # Source: unit.totalArea | type=double
          - name: living_area
            description: "Livable area (m²). IN row_hash."
            # Source: unit.livingArea | type=double
          - name: num_bedrooms
            description: "Bedroom count. IN row_hash."
            # Source: unit.numberOfBedrooms | type=bigint
          - name: num_bathrooms
            description: "Bathroom count. IN row_hash."
            # Source: unit.numberOfBathrooms | type=bigint
          - name: floor_id
            description: "RE/MAX-encoded floor identifier. IN row_hash. Pair with floor_number for the actual integer floor."
            # Source: unit.floorID | type=bigint
          - name: floor_number
            description: "Floor as integer (0=ground, -1=basement, etc.). IN row_hash."
            # Source: unit.floorAsNumber | type=bigint
          - name: listing_status_id
            description: "RE/MAX-encoded status (active/sold/reserved/etc.). IN row_hash. TODO: ID→label mapping."
            # Source: unit.listingStatusID | type=bigint
          - name: is_sold
            description: "Boolean flag — listing has been sold. IN row_hash."
            # Source: unit.isSold (cast to bool) | type=boolean
          - name: sold_date
            description: "Date the listing was marked sold. IN row_hash."
            # Source: unit.soldDate | type=varchar
          - name: is_online
            description: "Boolean — whether the listing is currently published. IN row_hash. Drives Pass 2 enrichment (only online listings get Next.js detail fetched)."
            # Source: unit.isOnline (cast to bool) | type=boolean
          - name: is_active
            description: "Boolean — listing is in active sales pipeline. IN row_hash."
            # Source: unit.isActive (cast to bool) | type=boolean
          - name: energy_efficiency_level
            description: "RE/MAX-encoded energy class (A+ to G). IN row_hash. TODO: ID→letter mapping."
            # Source: unit.energyEfficiencyLevelID | type=bigint
          - name: typology_id
            description: "RE/MAX-encoded typology (T0/T1/T2 etc.). IN row_hash. TODO: ID→label mapping."
            # Source: unit.typologyID | type=bigint
          - name: listing_type
            description: "Listing type label (e.g., 'Apartamento', 'Moradia')."
            # Source: unit.listingType | type=varchar
          - name: publish_date
            description: "Original publish timestamp on RE/MAX."
            # Source: unit.publishDate | type=timestamptz
          - name: modified
            description: "Last modification timestamp on RE/MAX side. NOT in row_hash (changes every load even when content stable)."
            # Source: unit.modified | type=timestamptz
          - name: region_name2
            description: "Concelho-level region name. Excluded from row_hash."
            # Source: unit.regionName2 | type=varchar
          - name: region_name3
            description: "Freguesia-level region name. Excluded from row_hash."
            # Source: unit.regionName3 | type=varchar
          - name: garage_spots
            description: "Number of garage spaces. IN row_hash."
            # Source: unit.garageSpots | type=bigint
          - name: parking
            description: "Boolean — listing has parking. IN row_hash."
            # Source: unit.parking (cast to bool) | type=boolean
          - name: is_exclusive
            description: "Boolean — RE/MAX exclusive mandate. IN row_hash."
            # Source: unit.isExclusive (cast to bool) | type=boolean
          - name: is_remax_collection
            description: "Boolean — premium 'RE/MAX Collection' branding. IN row_hash."
            # Source: unit.isRemaxCollection (cast to bool) | type=boolean
          - name: price_reduction_pct
            description: "Recent price-cut percentage (negative number = price drop). IN row_hash."
            # Source: unit.priceReductionPercentageValue | type=numeric
          - name: address
            description: "Street address from Pass 2 (Next.js detail). NULL when no Pass 2 fetched (offline listings) or fetch failed. Excluded from row_hash (immutable)."
            # Source: detail.address (Pass 2) | type=varchar
          - name: apartment_number
            description: "Unit number / fraction letter from Pass 2. Excluded from row_hash."
            # Source: detail.apartment_number (Pass 2) | type=varchar
          - name: market_days
            description: "Days on market — Pass 2 snapshot. Changes every run, EXCLUDED from row_hash."
            # Source: detail.market_days (Pass 2) | type=bigint
          - name: previous_price
            description: "Previous price before current — Pass 2 snapshot. EXCLUDED from row_hash."
            # Source: detail.previous_price (Pass 2) | type=numeric
          - name: construction_year
            description: "Year built — Pass 2 only. Excluded from row_hash (immutable)."
            # Source: detail.construction_year (Pass 2) | type=bigint
          - name: contract_date
            description: "Contract / development registration date — Pass 2."
            # Source: detail.contract_date (Pass 2) | type=varchar
          - name: floor_description
            description: "Free-text floor description (e.g., 'Andar 3 / 5'). Pass 2 only."
            # Source: detail.floor_description (Pass 2) | type=varchar
          - name: listing_rooms
            description: "Per-room area breakdown (Pass 2). JSONB, excluded from row_hash — Next.js may reorder."
            # Source: detail.listing_rooms (Pass 2) | type=jsonb
          - name: listing_pictures
            description: "Pass 2 detail picture URL list. JSONB. Excluded from row_hash. Distinct from `gallery` (which is Pass 1)."
            # Source: detail.listing_pictures (Pass 2) | type=jsonb
          - name: unit_latitude
            description: "Pass 2 unit-level latitude (often more precise than the development's lat). Excluded from row_hash."
            # Source: detail.unit_latitude (Pass 2) | type=numeric
          - name: unit_longitude
            description: "Pass 2 unit-level longitude."
            # Source: detail.unit_longitude (Pass 2) | type=numeric
          - name: _has_detail
            description: "Boolean — TRUE when Pass 2 enrichment succeeded for this listing. Use to filter out unenriched rows when reasoning about Pass 2 fields."
            # Internal | type=boolean
          - name: gallery
            description: "Pass 1 picture URL array. JSONB. Excluded from row_hash (Next.js reordering)."
            # Source: unit.listingPictures (Pass 1) | type=jsonb
          - name: raw_json
            description: "Full upstream Pass 1 record. JSONB, excluded from row_hash. Fallback for fields not promoted to typed columns."
            # Source: unit (Pass 1) | type=jsonb
          - name: row_hash
            description: "SHA256 over LISTINGS_VERSION_COLUMNS (price, status, areas, bedrooms, etc.). Drives SCD2 diff. dlt-managed."
            # Internal | type=varchar, not_null
          - name: _dlt_valid_from
            description: "SCD2 active-from. dlt-managed."
          - name: _dlt_valid_to
            description: "SCD2 active-to. NULL = current version."
          - name: _dlt_load_id
            description: "dlt batch identifier."
          - name: _dlt_id
            description: "dlt internal row identifier."

      - name: remax_listings_state
        description: >
          UPSERT heartbeat sidecar for remax_listings. last_seen_date drives
          active-listing detection in silver.

      - name: remax_plots
        description: >
          RE/MAX SCD2 plot/terreno facts (~12,499 rows). PK: listing_id.
          Sitemap + Next.js ingestion path (the wider RE/MAX schema, ~60 cols).
          Source: sitemap.xml walk (Pass 1) + Next.js detail JSON (Pass 2).
        columns:
          - name: listing_id
            description: "RE/MAX listing primary key for the plot."
          - name: agent_id
            description: "Selling agent identifier."
          - name: office_id
            description: "Selling office identifier."
          - name: team_id
            description: "Sales team identifier (optional)."
          - name: user_id
            description: "User account identifier (often == agent_id)."
          - name: owner_page_id
            description: "RE/MAX agent landing-page identifier."
          - name: listing_class_id
            description: "RE/MAX-encoded listing class."
          - name: listing_type
            description: "Listing type label (typically 'Terreno' for plots)."
          - name: listing_type_id
            description: "RE/MAX-encoded listing type."
          - name: business_type
            description: "Business type label (e.g., 'Venda', 'Aluguer')."
          - name: business_type_id
            description: "RE/MAX-encoded business type."
          - name: listing_status_id
            description: "Status code (active/sold/reserved). IN row_hash."
          - name: market_status_id
            description: "Market status code. IN row_hash."
          - name: is_sold
            description: "Boolean — sold flag. IN row_hash."
          - name: sold_date
            description: "Date of sale. IN row_hash."
          - name: is_online
            description: "Boolean — currently published. IN row_hash."
          - name: is_active
            description: "Boolean — in active sales pipeline. IN row_hash."
          - name: is_special
            description: "Boolean — RE/MAX special tag. IN row_hash."
          - name: is_special_exclusive
            description: "Boolean — exclusive special tag. IN row_hash."
          - name: listing_price
            description: "Asking price in EUR. IN row_hash."
          - name: previous_price
            description: "Previous price (snapshot from detail). NOT in row_hash (changes every load)."
          - name: price_reduction_pct
            description: "Recent price-cut percentage. IN row_hash."
          - name: last_price_reduction_date
            description: "Date of most recent price cut."
          - name: lot_size
            description: "Plot area in m² — the primary plot-specific metric. IN row_hash."
          - name: lot_size_display
            description: "Display-formatted lot size (e.g., '1.500 m²')."
          - name: total_area
            description: "Total area (m²). IN row_hash."
          - name: built_area
            description: "Already-built area on the plot, if any."
          - name: living_area
            description: "Livable area, if construction exists on the plot."
          - name: address
            description: "Street address from Next.js detail. Excluded from row_hash (immutable)."
          - name: local_zone
            description: "Local zone label (e.g., neighbourhood / district name)."
          - name: zip_code
            description: "Portuguese postal code (NNNN-NNN)."
          - name: is_exact_address
            description: "Boolean — TRUE if RE/MAX exposes the exact address; FALSE if approximate."
          - name: has_private_address
            description: "Boolean — address withheld at owner's request."
          - name: public_address
            description: "Boolean — address published publicly on the listing page."
          - name: country_id
            description: "Country code (always Portugal in scope)."
          - name: region1_id
            description: "Region hierarchy level 1 (broadest)."
          - name: region2_id
            description: "Region hierarchy level 2 (typically concelho)."
          - name: region3_id
            description: "Region hierarchy level 3 (typically freguesia)."
          - name: region_name1
            description: "Region level 1 display name."
          - name: region_name2
            description: "Concelho name."
          - name: region_name3
            description: "Freguesia name."
          - name: region_name4
            description: "Sub-freguesia / locality name (sparse)."
          - name: region_search2
            description: "URL-friendly slug for region 2 (e.g., 'lisboa')."
          - name: region_search3
            description: "URL-friendly slug for region 3."
          - name: energy_efficiency_level
            description: "Energy class code. IN row_hash."
          - name: emission_efficiency_level
            description: "Emission class code."
          - name: construction_year
            description: "Year built (if any structure exists). Excluded from row_hash (immutable)."
          - name: market_days
            description: "Days on market — snapshot. NOT in row_hash."
          - name: language_id
            description: "Listing language code."
          - name: master_id
            description: "Master listing reference (RE/MAX internal)."
          - name: description_tags
            description: "URL-style tag string used in RE/MAX detail page slug (e.g., 'venda-terreno-lisboa-...')."
          - name: descriptions
            description: "Marketing descriptions array (multi-language). JSONB."
          - name: listing_pictures
            description: "Picture URL array. JSONB. Excluded from row_hash."
          - name: listing_attributes_ids
            description: "Array of feature/attribute IDs (amenities, etc.). JSONB."
          - name: near_regions
            description: "Nearby regions array. JSONB."
          - name: raw_json
            description: "Full upstream record from Next.js detail. JSONB, excluded from row_hash."
          - name: row_hash
            description: "SHA256 over PLOTS_VERSION_COLUMNS. dlt-managed."
          - name: _dlt_valid_from
            description: "SCD2 active-from."
          - name: _dlt_valid_to
            description: "SCD2 active-to. NULL = current."
          - name: _dlt_load_id
            description: "dlt batch identifier."
          - name: _dlt_id
            description: "dlt internal row identifier."

      - name: remax_plots_state
        description: >
          UPSERT heartbeat sidecar for remax_plots.

      # ────────────────────────────────────────────────────────────────────
      # Idealista portal — loaded by idealista_developments_dlt DAG
      # (Wednesdays 06:00 UTC). Universal Scraper + RE API (3-pass).
      # See pipelines/portals/idealista/README.md.
      # ────────────────────────────────────────────────────────────────────

      - name: idealista_developments
        description: >
          Idealista SCD2 development facts (~1,994 rows). PK: development_id.
          3-pass strategy: Universal Scraper discovery (card list per area) →
          Universal Scraper development detail → RE API unit detail.
          development_id is a varchar (not bigint) — Idealista's IDs include
          alphanumeric prefixes.
        columns:
          - name: development_id
            description: "Idealista development primary key (alphanumeric varchar)."
            # Source: card.development_id | type=varchar
          - name: development_url
            description: "Full Idealista URL for the development page."
            # Source: card.development_url | type=varchar
          - name: name
            description: "Development name as displayed."
            # Source: card.name | type=varchar
          - name: area_key
            description: "Idealista internal area code used in URLs."
            # Source: card.area_key | type=varchar
          - name: area_slug
            description: "URL-friendly area slug (e.g., 'lisboa', 'aveiro'). Used to derive concelho/freguesia downstream."
            # Source: card.area_slug | type=varchar
          - name: min_price
            description: "Cheapest unit price in EUR (numeric). Parsed from min_price_text. NOT in row_hash — min_price_text is the canonical price field for SCD2."
            # Source: card.min_price | type=numeric
          - name: min_price_text
            description: "Raw price string as Idealista displays it (e.g., '350.000 €'). IN row_hash — text representation triggers version detection."
            # Source: card.min_price_text | type=varchar
          - name: min_price_label
            description: "Marketing label for price (e.g., 'desde', 'a partir de')."
            # Source: card.min_price_label | type=varchar
          - name: typology_summary
            description: "Comma-separated typology list (e.g., 'T1, T2, T3'). IN row_hash."
            # Source: card.typology_summary | type=varchar
          - name: description_summary
            description: "Short marketing teaser (Pass 1)."
            # Source: card.description_summary | type=varchar
          - name: cover_image
            description: "Hero image URL."
            # Source: card.cover_image | type=varchar
          - name: is_featured
            description: "Boolean — featured/promoted flag."
            # Source: card.is_featured (cast to bool) | type=boolean
          - name: is_branded
            description: "Boolean — branded developer presentation."
            # Source: card.is_branded (cast to bool) | type=boolean
          - name: online_booking
            description: "Boolean — online booking enabled. IN row_hash."
            # Source: card.online_booking (cast to bool) | type=boolean
          - name: title
            description: "Pass 2 page title."
            # Source: detail.title (Pass 2)
          - name: h1
            description: "Pass 2 H1 heading from the page."
            # Source: detail.h1 (Pass 2)
          - name: is_completed
            description: "Boolean — construction-complete flag (Pass 2). IN row_hash — flips when project finishes."
            # Source: detail.is_completed (cast to bool, Pass 2) | type=boolean
          - name: og_title
            description: "Pass 2 OpenGraph title (SEO)."
            # Source: detail.og_title (Pass 2)
          - name: og_description
            description: "Pass 2 OpenGraph description."
            # Source: detail.og_description (Pass 2)
          - name: og_image
            description: "Pass 2 OpenGraph image URL."
            # Source: detail.og_image (Pass 2)
          - name: promoter_name
            description: "Developer / promoter name (Pass 2)."
            # Source: detail.promoter_name (Pass 2)
          - name: description_full
            description: "Full marketing description (Pass 2)."
            # Source: detail.description_full (Pass 2)
          - name: address_text
            description: "Free-text address (Pass 2)."
            # Source: detail.address_text (Pass 2)
          - name: gallery
            description: "Picture URL array (Pass 2). JSONB. Excluded from row_hash."
            # Source: detail.gallery (Pass 2) | type=jsonb
          - name: unit_links
            description: "Array of {unit_id, unit_url, summary} entries — drives Pass 3 fan-out to RE API. JSONB."
            # Source: detail.unit_links (Pass 2) | type=jsonb
          - name: units_count
            description: "Number of units in the development. IN row_hash — count change triggers version (units sold/added)."
            # Source: detail.units_count (Pass 2) | type=bigint
          - name: attachments
            description: "PDF brochures / attachments array. JSONB."
            # Source: detail.attachments (Pass 2) | type=jsonb
          - name: _has_detail
            description: "Boolean — TRUE when Pass 2 detail fetched successfully."
            # Internal | type=boolean
          - name: raw_meta
            description: "Diagnostic JSONB with the original card payload + sorted detail keys. Excluded from row_hash."
            # Internal | type=jsonb
          - name: row_hash
            description: "SHA256 over DEVELOPMENTS_VERSION_COLUMNS. dlt-managed."
          - name: _dlt_valid_from
            description: "SCD2 active-from."
          - name: _dlt_valid_to
            description: "SCD2 active-to. NULL = current."
          - name: _dlt_load_id
            description: "dlt batch identifier."
          - name: _dlt_id
            description: "dlt internal row identifier."

      - name: idealista_developments_state
        description: >
          UPSERT heartbeat sidecar for idealista_developments.

      - name: idealista_development_units
        description: >
