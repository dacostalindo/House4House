          - name: localizacaolevel4imovel
            description: "Region level 4 (sparse)."
          - name: localizacaolevel5imovel
            description: "Region level 5 (sparse)."
          - name: idlocalizacaolevel1imovel
            description: "Region level 1 ID."
          - name: idlocalizacaolevel2imovel
            description: "Region level 2 ID (concelho)."
          - name: idlocalizacaolevel3imovel
            description: "Region level 3 ID (freguesia)."
          - name: localizacaolevel1
            description: "Region level 1 display name."
          - name: localizacaolevel2
            description: "Concelho name."
          - name: localizacaolevel3
            description: "Freguesia name."
          - name: localizacaoiso
            description: "ISO region code."
          - name: geocoordinateslat
            description: "Latitude as STRING. IN row_hash. Cast to numeric in silver."
          - name: geocoordinateslong
            description: "Longitude as STRING. IN row_hash."
          - name: precoimovel
            description: "Price as formatted string. IN row_hash."
          - name: precosemformatacao
            description: "Price as bigint. IN row_hash. Authoritative numeric price."
          - name: valorantigo
            description: "Previous price (string). IN row_hash."
          - name: dataultimabaixa
            description: "Date of most recent price drop."
          - name: moedaimovel_descl
            description: "Currency long description."
          - name: moedaimovel_descr
            description: "Currency symbol."
          - name: idestadoimovel
            description: "Plot state code (active/sold/reserved). IN row_hash."
          - name: areaterreno
            description: "Plot/terrain area in m² — primary plot metric. IN row_hash."
          - name: areaimplement
            description: "Building footprint area (m²) for plots with existing structures."
          - name: url_detail_view_link
            description: "Full Zome URL for the plot detail page."
          - name: abbrsigned
            description: "Abbreviated signed reference."
          - name: dataentradarede
            description: "Date listing entered the Zome network."
          - name: showwebsite
            description: "Boolean — published on website. IN row_hash."
          - name: mostrarprecoangwebsite
            description: "Boolean — show price on agent website."
          - name: showcrypto
            description: "Boolean — accepting crypto."
          - name: mostrarprecoangcrypto
            description: "Boolean — show crypto pricing."
          - name: idconsultor
            description: "Selling consultant ID."
          - name: moradahubconsultorid
            description: "Hub office ID."
          - name: rating
            description: "Listing rating score."
          - name: lastdateupdate
            description: "Last update timestamp."
          - name: idemp
            description: "FK to zome_developments when plot belongs to a development."
          - name: idgroup
            description: "Listing group ID."
          - name: emid
            description: "External listing reference."
          - name: nome_emp
            description: "Development name (if linked)."
          - name: grupo_emp
            description: "Boolean — part of a development group."
          - name: destaque
            description: "Boolean — featured/highlighted."
          - name: reservadozomenow
            description: "Boolean — reserved via online booking. IN row_hash."
          - name: createdat
            description: "Upstream creation timestamp."
          - name: gallery
            description: "Picture URL array. JSONB."
          - name: gallerymainimages
            description: "Hero images array. JSONB."
          - name: regiao
            description: "Region hierarchy. JSONB."
          - name: geolocation
            description: "Geo metadata. JSONB."
          - name: raw_json
            description: "Full upstream record. JSONB."
          - name: row_hash
            description: "SHA256 over PLOTS_VERSION_COLUMNS. dlt-managed."
          - name: _dlt_valid_from
            description: "SCD2 active-from."
          - name: _dlt_valid_to
            description: "SCD2 active-to. NULL = current."
          - name: _dlt_load_id
            description: "dlt batch identifier."
          - name: _dlt_id
            description: "dlt internal row identifier."

      - name: zome_plots_state
        description: >
          UPSERT heartbeat sidecar for zome_plots.

      # ────────────────────────────────────────────────────────────────────
      # Zome reference tables — REPLACE-mode lookup tables.
      # Decoded into silver staging via JOINs.
      # ────────────────────────────────────────────────────────────────────

      - name: ref_zome_condition
        description: >
          Zome property condition lookup (REPLACE-mode load each run).
          Decodes idcondicaoimovel column on zome_listings / zome_plots.

      - name: ref_zome_property_type
        description: >
          Zome property type lookup (REPLACE). Decodes idtipoimovel.
          idtipoimovel=3 isolates plots/terrenos.

      - name: ref_zome_business_type
        description: >
          Zome business type lookup (REPLACE). Decodes idtiponegocio
          (Sale / Rent / Other categories).

      # ────────────────────────────────────────────────────────────────────
      # JLL portal — loaded by jll_dlt DAG. Typed REST API (no multi-pass).
      # 0 Aveiro coverage as of 2026-05-20 — JLL operates only in
      # Lisboa/Porto/Faro/Setúbal. Declared for sprint-09 Slice B-prime's
      # stg_portal_developments_jll (future-proofs the silver UNION).
      # ────────────────────────────────────────────────────────────────────

      - name: jll_developments
        description: >
          JLL SCD2 development facts (~169 rows nationwide, 0 in Aveiro).
          One row per (development_id, version) — `_dlt_valid_to IS NULL`
          selects current state. Cleanest schema of the 4 portals: typed
          `municipality`/`parish`/`district` columns, double-precision
          `gps_lat`/`gps_lon`, and a `has_gps_location` boolean reliability
          flag. Plots are out of scope per [[jll]] Quirks (vui-protected
          endpoint). Documented in [[portal-field-map]].
        columns:
          - name: development_id
            description: "JLL development primary key (bigint). Stable across runs. Equals `id`."
          - name: uid
            description: "External display UID (GUID varchar). Stable."
          - name: name
            description: "Project name (short form)."
          - name: title
            description: "Project name (descriptive form). Identical to `name` in practice; preferred for canonical_name."
          - name: address
            description: "Full street address (typed varchar)."
          - name: district
            description: "Distrito name (typed). Restricted to Lisboa/Porto/Faro/Setúbal."
          - name: municipality
            description: "Concelho name (typed varchar)."
          - name: parish
            description: "Freguesia name (typed varchar)."
          - name: zip_code
            description: "Portuguese postal code."
          - name: gps_lat
            description: "Latitude (double). Reliable only when has_gps_location = TRUE."
          - name: gps_lon
            description: "Longitude (double). Reliable only when has_gps_location = TRUE."
          - name: has_gps_location
            description: "Boolean reliability flag for gps_lat/gps_lon. JLL-unique."
          - name: total_fractions
            description: "Total unit count (bigint)."
          - name: total_available_fractions
            description: "Currently-available unit count (bigint)."
          - name: status
            description: "Lifecycle status (typed varchar)."
          - name: availability
            description: "Inventory availability (typed varchar)."
          - name: condition
            description: "Development condition (typed varchar)."
          - name: year
            description: "Construction year (bigint)."
          - name: min_property_formatted_price
            description: "Cheapest unit price, pre-formatted display string."
          - name: max_property_formatted_price
            description: "Priciest unit price, pre-formatted display string."
          - name: row_hash
            description: "SHA256 over the version columns. Drives SCD2 diff. dlt-managed."
          - name: _dlt_valid_from
            description: "SCD2 active-from timestamp. dlt-managed."
          - name: _dlt_valid_to
            description: "SCD2 active-to timestamp. NULL = currently-active version."

      - name: jll_listings
        description: >
          JLL SCD2 listing facts. One row per (id, version) — `_dlt_valid_to IS NULL`
          selects current state. ~7,455 active listings nationally, 0 Aveiro
          (JLL operates Lisboa/Porto/Faro/Setúbal). Floor plans in `blue_prints`
          JSONB column (92.7% coverage — best across portals). Loaded by jll_dlt DAG.
          Consumed by stg_portal_listings_jll → unified_listings_residential.
        columns:
          - name: id
            description: "JLL listing primary key (bigint). Stable across runs."
          - name: _dlt_valid_to
            description: "SCD2 active-to timestamp. NULL = currently-active version."

      # ────────────────────────────────────────────────────────────────────
      # imovirtual portal — loaded by the imovirtual_dlt DAG (Next.js _next/data
      # JSON). Devs+units national, plots Aveiro. See wiki/sources/imovirtual.md
      # and wiki/decisions/2026-06-05-imovirtual-portal-onboarding.md.
      # ────────────────────────────────────────────────────────────────────
      - name: imovirtual_developments
        description: >
          imovirtual SCD2 development facts (national). One row per
          (development_id, version) — `_dlt_valid_to IS NULL` = current state.
          PK: development_id (numeric ad.id).
        columns:
          - name: development_id
            description: "imovirtual development PK (numeric). Stable across runs."
          - name: name
            description: "Project name (ad.title)."
          - name: slug
            description: "URL slug, e.g. jc-barrocas-ID1hFvB."
          - name: status
            description: "Lifecycle status, e.g. 'active'."
          - name: category_type
            description: "adCategory.type — 'INVESTMENT' for developments."
          - name: gps_lat
            description: "Dev-level latitude (location.coordinates)."
          - name: gps_lon
            description: "Dev-level longitude."
          - name: distrito
            description: "District from reverseGeocoding (level=district)."
          - name: concelho
            description: "Concelho from reverseGeocoding (level=council)."
          - name: parish
            description: "Freguesia from reverseGeocoding (level=parish)."
          - name: address_text
            description: "Street name (location.address.street.name)."
          - name: total_units
            description: "True project size (topInformation.number_of_units_in_project), NOT the listed subset."
          - name: listed_units_count
            description: "Currently-advertised units (paginatedUnits.totalResults)."
          - name: price_per_m_from
            description: "Cheapest €/m² (pivoted from characteristics). TEXT in bronze."
          - name: area_from
            description: "Min unit area m² (characteristics). TEXT."
          - name: area_to
            description: "Max unit area m² (characteristics). TEXT."
          - name: state
            description: "Build state, e.g. 'in_building' (characteristics)."
          - name: offered_estates_type
            description: "Offered type, e.g. 'flats' (characteristics)."
          - name: promoter_id
            description: "Developer id (owner.id)."
          - name: promoter_name
            description: "Developer name (owner.name)."
          - name: created_at
            description: "Ad creation timestamp (ISO string)."
          - name: modified_at
            description: "Ad last-modified timestamp (ISO string)."
          - name: row_hash
            description: "SHA256 over the version columns. Drives SCD2 diff. dlt-managed."
          - name: _dlt_valid_from
            description: "SCD2 active-from timestamp. dlt-managed."
          - name: _dlt_valid_to
            description: "SCD2 active-to timestamp. NULL = currently-active version."

      - name: imovirtual_developments_state
        description: >
          UPSERT heartbeat sidecar for imovirtual_developments. PK development_id.
          Silver treats a dev active when last_seen_date >= current_date - 21.
        columns:
          - name: development_id
            description: "FK to imovirtual_developments.development_id."
          - name: last_seen_date
            description: "Date this development was last seen in the source."

      - name: imovirtual_development_units
        description: >
          imovirtual SCD2 unit facts (national). One row per (unit_id, version).
          PK unit_id; FK development_id (minted at parse time from the parent dev).
          Sourced from the dev's embedded paginatedUnits (no per-unit Pass 3).
        columns:
          - name: unit_id
            description: "imovirtual unit PK (numeric)."
          - name: development_id
            description: "FK to imovirtual_developments.development_id."
          - name: unit_url
            description: "Unit /anuncio/ URL."
          - name: price
            description: "Asking price (characteristics.price). TEXT in bronze."
          - name: price_per_m
            description: "€/m² (characteristics.price_per_m). TEXT."
          - name: area_m
            description: "Area m² (characteristics.m). TEXT."
          - name: rooms_num
            description: "Room count (characteristics.rooms_num). TEXT."
          - name: energy_certificate
            description: "Energy class, e.g. 'a' (characteristics)."
          - name: floor_no
            description: "Floor, e.g. 'floor_1' (characteristics)."
          - name: building_floors_num
            description: "Total floors in building (characteristics). TEXT."
          - name: building_type
            description: "e.g. 'block' (characteristics)."
          - name: construction_status
            description: "e.g. 'to_completion' (characteristics)."
          - name: market
            description: "'primary' / 'secondary' (characteristics)."
          - name: adcategory_type
            description: "adCategory.type — 'SELL' for units."
          - name: row_hash
            description: "SHA256 over the version columns. Drives SCD2 diff. dlt-managed."
          - name: _dlt_valid_from
            description: "SCD2 active-from timestamp. dlt-managed."
          - name: _dlt_valid_to
            description: "SCD2 active-to timestamp. NULL = currently-active version."

      - name: imovirtual_development_units_state
        description: >
          UPSERT heartbeat sidecar for imovirtual_development_units. PK unit_id.
        columns:
          - name: unit_id
            description: "FK to imovirtual_development_units.unit_id."
          - name: last_seen_date
            description: "Date this unit was last seen in the source."

      - name: imovirtual_plots
        description: >
          imovirtual SCD2 terreno facts (Aveiro). One row per (listing_id, version).
          PK listing_id. List + per-plot /anuncio/ detail (coords + classification).
        columns:
          - name: listing_id
            description: "imovirtual plot PK (numeric)."
          - name: title
            description: "Listing title (often carries the classification)."
          - name: status
            description: "Lifecycle status, e.g. 'active'."
          - name: gps_lat
            description: "Latitude (from /anuncio/ detail)."
          - name: gps_lon
            description: "Longitude (from /anuncio/ detail)."
          - name: distrito
            description: "District from reverseGeocoding."
          - name: concelho
            description: "Concelho from reverseGeocoding."
          - name: parish
            description: "Freguesia from reverseGeocoding."
          - name: price
            description: "Asking price (characteristics.price). TEXT."
          - name: price_per_m
            description: "€/m² (characteristics.price_per_m). TEXT."
          - name: area_m
            description: "Terrain area m² (characteristics.m). TEXT."
          - name: classification
            description: "Plot type (characteristics.type — building/agricultural/habitat/woodland/commercial/…). Nullable."
          - name: is_private_owner
            description: "True when owner.type == 'private'."
          - name: row_hash
            description: "SHA256 over the version columns. Drives SCD2 diff. dlt-managed."
          - name: _dlt_valid_from
            description: "SCD2 active-from timestamp. dlt-managed."
          - name: _dlt_valid_to
            description: "SCD2 active-to timestamp. NULL = currently-active version."

      - name: imovirtual_plots_state
        description: >
          UPSERT heartbeat sidecar for imovirtual_plots. PK listing_id.
        columns:
          - name: listing_id
            description: "FK to imovirtual_plots.listing_id."
          - name: last_seen_date
            description: "Date this plot was last seen in the source."
