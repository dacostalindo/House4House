version: 2

models:
  - name: stg_portal_developments_remax
    description: >
      Canonical RE/MAX development staging — normalizes
      `bronze_listings.remax_developments` to the 13-column cross-portal schema
      consumed by sprint-09 Slice B-prime's `silver_unified_developments`. View.
      Filtered to active SCD2 rows (`_dlt_valid_to IS NULL`). Coords are
      parish-centroid-precision (per [[portal-field-map]] audit 2026-05-18):
      ~51% of nationwide rows have NULL coords; the rest often share lat/lng
      across distinct developments in the same parish. Downstream PR-C
      (`silver_unified_developments`) compensates via Levenshtein
      name-similarity disambiguation. RE/MAX `_dlt_valid_to IS NULL` filter
      excludes superseded SCD2 versions.
    columns:
      - name: portal
        description: "Literal 'remax'."
        tests:
          - not_null
          - accepted_values:
              values: ['remax']
      - name: portal_dev_id
        description: "RE/MAX `development_id` cast to TEXT — stable across runs; PK on this view."
        tests:
          - unique
          - not_null
      - name: canonical_name
        description: "RE/MAX project name (e.g. 'Domus Ria', 'Barroka', 'Edifício Aleluia')."
      - name: address_text
        description: "Composite address: `region_name3 + ', ' + region_name2` (parish + concelho). NULL when both region names are absent."
      - name: concelho
        description: "Concelho (region_name2), UPPER+TRIM normalised."
      - name: parish
        description: "Freguesia (region_name3)."
      - name: postal_code
        description: "Portuguese postal code (NNNN-NNN format). ~49% populated."
      - name: geom_3763
        description: "Development centroid in EPSG:3763 (PT-TM06). Parish-centroid precision — see model description."
      - name: geom_4326
        description: "Same in EPSG:4326 (WGS84). For Kepler.gl / Leaflet display."
      - name: total_units
        description: "Unit count from `listings_count`."
        tests:
          - not_null
      - name: listing_url
        description: "RE/MAX detail URL derived from slug."
      - name: raw_meta
        description: "JSONB escape hatch: region_name1, minimum_price, agent_name, office_name, publish_date."
      - name: _loaded_at
        description: "`NOW()` at staging-view evaluation."
        tests:
          - not_null

  - name: stg_portal_developments_zome
    description: >
      Canonical Zome development staging — normalizes
      `bronze_listings.zome_developments` to the 13-column cross-portal schema
      consumed by sprint-09 Slice B-prime's `silver_unified_developments`. View.
      Filtered to active SCD2 rows (`_dlt_valid_to IS NULL`). Zome stores
      geocoords as VARCHAR (cast via `NULLIF + ::FLOAT`); `regiao` is a JSONB
      int-array of region codes so address_text is composed from the
      `localizacaolevel*` hierarchy; total_units = available + reserved + sold.
      zome_developments verified 0 SCD2 dupes at the 2026-05-20 clean re-scrape.
    columns:
      - name: portal
        description: "Literal 'zome'."
        tests:
          - not_null
          - accepted_values:
              values: ['zome']
      - name: portal_dev_id
        description: "Zome `venture_id` cast to TEXT — stable across runs; PK on this view."
        tests:
          - unique
          - not_null
      - name: canonical_name
        description: "Zome project name (`nome` — e.g. 'ALPHA VIEW', 'Centro Aveiro')."
      - name: address_text
        description: "Composite address: `localizacaolevel3 + ', ' + localizacaolevel2` (parish + concelho). Zome `regiao` is an int-array, not a free-text address."
      - name: concelho
        description: "Concelho (localizacaolevel2), UPPER+TRIM normalised."
      - name: parish
        description: "Freguesia (localizacaolevel3)."
      - name: postal_code
        description: "Always NULL — Zome doesn't expose a postal code at development grain."
      - name: geom_3763
        description: "Development centroid in EPSG:3763 (PT-TM06). Cast from Zome's VARCHAR geocoord columns. ~98% populated."
      - name: geom_4326
        description: "Same in EPSG:4326 (WGS84)."
      - name: total_units
        description: "Unit count = imoveisdisponiveis + imoveisreservados + imoveisvendidos (Zome stores no single total)."
        tests:
          - not_null
      - name: listing_url
        description: "Zome public URL (`url_user_link`)."
      - name: raw_meta
        description: "JSONB escape hatch: emid, precosemformatacao, tipologiagrupos, per-state unit counts, idestado, deschub."
      - name: _loaded_at
        description: "`NOW()` at staging-view evaluation."
        tests:
          - not_null

  - name: stg_portal_developments_idealista
    description: >
      Canonical Idealista development staging — normalizes
      `bronze_listings.idealista_developments` to the 13-column cross-portal
      schema consumed by sprint-09 Slice B-prime's `silver_unified_developments`.
      View. Filtered to active SCD2 rows (`_dlt_valid_to IS NULL`). Idealista
      exposes coords AND admin geography only at unit grain — the unit_agg CTE
      rolls `idealista_development_units` up per development: `geom_*` is the
      AVG of geocoded unit points; `concelho`/`parish` come from the units'
      `location_hierarchy` ([distrito, concelho, freguesia] ordered array),
      which is reliable where the dev-level `address_text` is not.
      `canonical_name` is regex-extracted from `title` (`name` is the street
      address). 100% title-extraction on the 2026-05-18 Aveiro-distrito
      re-scrape (85/85).
    columns:
      - name: portal
        description: "Literal 'idealista'."
        tests:
          - not_null
          - accepted_values:
              values: ['idealista']
      - name: portal_dev_id
        description: "Idealista `development_id` (alphanumeric varchar) cast to TEXT — PK on this view."
        tests:
          - unique
          - not_null
      - name: canonical_name
        description: "Project name regex-extracted from `title` (`^Empreendimento (.+?) anuncia `). NULL if a row lacks a Pass-2 title."
      - name: address_text
        description: "Street-level address from bronze `name` (e.g. 'Rua de São Martinho s/n, Anta') — the richest idealista address field."
      - name: concelho
        description: "Concelho from the units' `location_hierarchy[1]` ([distrito, concelho, freguesia] array), UPPER+TRIM. Reliable where the dev-level address text only carries a freguesia."
      - name: parish
        description: "Freguesia from the units' `location_hierarchy[2]`. NULL when the hierarchy has no freguesia element (2-element [distrito, concelho] form)."
      - name: postal_code
        description: "Always NULL — idealista doesn't expose a postal code at development grain."
      - name: geom_3763
        description: "Development centroid in EPSG:3763 (PT-TM06) — AVG of geocoded units. NULL when no unit is geocoded."
      - name: geom_4326
        description: "Same in EPSG:4326 (WGS84)."
      - name: total_units
        description: "Unit count from `units_count`."
        tests:
          - not_null
      - name: listing_url
        description: "Idealista development detail URL (`development_url`)."
      - name: raw_meta
        description: "JSONB escape hatch: title_raw, location_hierarchy, area_slug, min_price, typology_summary, is_completed, promoter_name, n_geocoded_units."
      - name: _loaded_at
        description: "`NOW()` at staging-view evaluation."
        tests:
          - not_null

  - name: stg_portal_developments_jll
    description: >
      Canonical JLL development staging — normalizes
      `bronze_listings.jll_developments` to the 13-column cross-portal schema
      consumed by sprint-09 Slice B-prime's `silver_unified_developments`. View.
      Filtered to active SCD2 rows (`_dlt_valid_to IS NULL`). JLL is the
      cleanest of the 4 portals: typed `municipality`/`parish`/`district` +
      double-precision `gps_lat`/`gps_lon` (no casts). `has_gps_location` is an
      explicit reliability flag — geom is dropped when it is FALSE.
      `listing_url` is always NULL (JLL exposes no public URL). 0 Aveiro
      coverage as of the 2026-05-20 audit — JLL operates only in
      Lisboa/Porto/Faro/Setúbal, so this model contributes 0 rows to the v1
      Aveiro-scoped silver; it future-proofs the silver UNION for sprint-10
      portal expansion.
    columns:
      - name: portal
        description: "Literal 'jll'."
        tests:
          - not_null
          - accepted_values:
              values: ['jll']
      - name: portal_dev_id
        description: "JLL `development_id` cast to TEXT — PK on this view."
        tests:
          - unique
          - not_null
      - name: canonical_name
        description: "JLL project name — `COALESCE(title, name)` (the two are identical in practice)."
      - name: address_text
        description: "JLL `address` — full street address (typed varchar)."
      - name: concelho
        description: "Concelho (`municipality`), UPPER+TRIM normalised."
      - name: parish
        description: "Freguesia (`parish`, typed varchar)."
      - name: postal_code
        description: "Portuguese postal code (`zip_code`)."
      - name: geom_3763
        description: "Development centroid in EPSG:3763 (PT-TM06). NULL when `has_gps_location` is FALSE."
      - name: geom_4326
        description: "Same in EPSG:4326 (WGS84)."
      - name: total_units
        description: "Unit count from `total_fractions`."
        tests:
          - not_null
      - name: listing_url
        description: "Always NULL — JLL's API exposes no public listing URL."
      - name: raw_meta
        description: "JSONB escape hatch: uid, district, status, availability, condition, year, total_available_fractions, min/max formatted price."
      - name: _loaded_at
        description: "`NOW()` at staging-view evaluation."
        tests:
          - not_null

  - name: stg_plot_listings
    description: >
      Typed staging view over `bronze_listings.idealista_plots`, scoped to the
      Aveiro + Coimbra concelhos for sprint-09 Slice C (LLM plot extraction
      v1). 403 active rows at plan time (81 Aveiro + 322 Coimbra,
      2026-05-28). Filters: SCD2 active (`_dlt_valid_to IS NULL`),
      `property_description IS NOT NULL`, and `location_name` in the
      concelho-freguesia set. Derives `concelho_slug` ∈ {aveiro, coimbra}
      for downstream stratification. Feeds the Pydantic-AI extraction DAG
      and the `silver_plot_listings_enriched` join.
    columns:
      - name: listing_id
        description: "`bronze_listings.idealista_plots.external_listing_id` — stable across runs. PK on this view."
        tests:
          - unique
          - not_null
      - name: concelho_slug
        description: "Derived concelho tag, lowercase ASCII slug. Used for eval-set stratification + per-concelho QA."
        tests:
          - not_null
          - accepted_values:
              values: ['aveiro', 'coimbra']
      - name: description
        description: "`property_description` — Portuguese real-estate prose. LLM extracts numerics + permit + loteamento from this."
        tests:
          - not_null
      - name: listing_url
        description: "Idealista canonical URL for the listing — used together with `description` as the idempotency-hash input in the extraction DAG."
        tests:
          - not_null
      - name: property_subtype
        description: "Plot subtype (urban / rural / etc.) from bronze."
      - name: lot_size
        description: "Bronze structured lot size in m². Cross-validated against the LLM-extracted `parcel_area_m2` via `dq_total_vs_lot_size` in silver."
      - name: property_price
        description: "Listing price in EUR (bronze numeric)."
      - name: location_name
        description: "Bronze location string used by the concelho filter (e.g., 'Aveiro', 'Cacia, Aveiro', 'Coimbra')."
      - name: geom_3763
        description: "Listing point in EPSG:3763 (PT-TM06). NULL when bronze latitude/longitude are null. GIST-indexed downstream in silver."
      - name: geom_4326
        description: "Same in EPSG:4326 (WGS84)."
      - name: _loaded_at
        description: "`NOW()` at staging-view evaluation."
        tests:
          - not_null
