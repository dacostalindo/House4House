version: 2

sources:
  - name: bronze_location
    database: house4house
    schema: bronze_location
    tables:
      - name: raw_osm_pois
        description: "OSM points of interest. 174K+ rows. EPSG:4326."
        columns:
          - name: osm_id
            tests: [not_null]
          - name: fclass
            tests: [not_null]
          - name: geom
            description: "POINT geometry in EPSG:4326"

      - name: raw_osm_transport
        description: "OSM transport stops (bus, rail, metro). EPSG:4326."
        columns:
          - name: osm_id
            tests: [not_null]
          - name: fclass
            tests: [not_null]
          - name: geom
            description: "POINT geometry in EPSG:4326"
