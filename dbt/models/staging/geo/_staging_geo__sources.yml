version: 2

sources:
  - name: bronze_geo
    database: house4house
    schema: bronze_geo
    tables:
      - name: raw_caop_freguesias
        description: "CAOP 2025 parish boundaries. 3,049 rows. EPSG:3763."
        columns:
          - name: dtmnfr
            description: "6-digit code: distrito(2) + municipio(2) + freguesia(2)"
          - name: geom
            description: "MultiPolygon in EPSG:3763 (PT-TM06/ETRS89)"

      - name: raw_caop_municipios
        description: "CAOP 2025 municipality boundaries. 278 rows. EPSG:3763."

      - name: raw_caop_distritos
        description: "CAOP 2025 district boundaries. 18 rows. EPSG:3763."

      - name: raw_cos_national_ogc
        description: >
          COS 2023 (Carta de Uso e Ocupação do Solo) land-use/cover polygons from the
          DGT OGC API (`ogcapi.dgterritorio.gov.pt/collections/cos2023v1`). Bbox-filtered
          to the Aveiro distrito for the v1 wedge scope (~5-15k polygons; the full national
          set has ~784k). 4-level hierarchical classification preserved.
          CRS: EPSG:3763 (PT-TM06/ETRS89) — transformed on insert from the OGC API's native EPSG:4326.
          Source: pipelines/gis/cos_ogc/cos_ogc_bronze_dag.py
        columns:
          - name: feature_id
            description: "OGC feature `objectid`"
          - name: municipio
            description: "Municipality name (new in OGC, not in legacy GeoPackage)"
          - name: nutsii
            description: "NUTS II region code (new in OGC, not in legacy GeoPackage)"
          - name: nutsiii
            description: "NUTS III region code (new in OGC, not in legacy GeoPackage)"
          - name: cos23_n4_c
            description: "4-level land-use code (e.g. '1.1.1.1'). OGC field: COS23_n4_C"
          - name: cos23_n4_l
            description: "Land-use label in Portuguese. OGC field: COS23_n4_L"
          - name: area_ha
            description: "Polygon area in hectares — computed `ST_Area(geom) / 10000` post-transform (not in OGC properties)"
          - name: geom
            description: "MultiPolygon in EPSG:3763 (PT-TM06/ETRS89)"
