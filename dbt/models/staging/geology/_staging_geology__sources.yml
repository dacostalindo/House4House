version: 2

sources:
  - name: bronze_geology
    database: house4house
    schema: bronze_geology
    description: >
      Geology bronze tables: LNEG CGP500k 1:500k national geology layer.
      Higher-resolution layers (CGP200k, CGP50k INSPIRE vector) have gaps
      covering Aveiro per [[lneg]] wiki page. 1:50k JPGw rasters exist for
      Aveiro but are out-of-scope for spatial joins (sprint-10 UI layer
      candidate).
    tables:
      - name: raw_lneg_geology_500k
        description: >
          LNEG CGP500k Geologia do Continente — ~282 polygons national.
          Generic JSONB pattern. Loaded by lneg_bronze_load DAG.
          See [[lneg]] for upstream-authority context (endpoint, license, coverage).
          Per [[silver-dq-baseline]] Rule 0, JSONB key descriptions live on the
          typed staging outputs, not here — see stg_lneg_geology.sql header
          comment for the current key list (discovered 2026-06-02; the
          previously-claimed `Idade_Litologia` does NOT exist in this layer —
          the lithology code lives under `Código`).
        columns:
          - name: feature_id
            description: ArcGIS OBJECTID
          - name: layer_name
            description: Constant 'lneg_geology_500k'
          - name: properties
            description: "JSONB — see stg_lneg_geology.sql header comment for current key list (discovered 2026-06-02). Authority: live ArcGIS REST endpoint, not the wiki."
          - name: geom
            description: Polygon geometry in EPSG:3763 (server-reprojected)
