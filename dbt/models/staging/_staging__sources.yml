version: 2

sources:
  - name: bronze_geo
    database: house4house
    schema: bronze_geo
    tables:
      - name: raw_caop_freguesias
        description: "CAOP freguesia boundaries. 3,049 rows. EPSG:3763."
        columns:
          - name: dtmnfr
            description: "6-digit code: distrito(2) + municipio(2) + freguesia(2)"
          - name: geom
            description: "MultiPolygon in EPSG:3763 (PT-TM06/ETRS89)"

      - name: raw_caop_municipios
        description: "CAOP municipio boundaries. 278 rows. EPSG:3763."

      - name: raw_caop_distritos
        description: "CAOP distrito boundaries. 18 rows. EPSG:3763."

  - name: bronze_ine
    database: house4house
    schema: bronze_ine
    tables:
      - name: raw_bgri
        description: "Census 2021 BGRI statistical subsections. 203,264 rows."
        columns:
          - name: dtmnfr21
            description: "6-digit freguesia code for joining with CAOP"
