version: 2

models:
  - name: stg_pdm_ordenamento
    description: >
      Staging view over CRUS land-use polygons from bronze_regulatory.raw_pdm_ordenamento.
      Renames Portuguese field names to English, trims whitespace from text columns,
      and adds WGS84 geometry projection for spatial joins with listings.
      Source: DGTERRITÓRIO CRUS WFS endpoints for 5 municipalities.
    columns:
      - name: feature_id
        description: "CRUS feature ID (global integer from DGTERRITÓRIO)"
        tests:
          - not_null

      - name: municipality_code
        description: "4-digit DTCC municipality code (e.g. 0105 = Aveiro)"
        tests:
          - not_null

      - name: municipality_name
        description: "Municipality name, trimmed (e.g. AVEIRO, LISBOA)"

      - name: land_classification
        description: "PDM land classification: 'Solo Urbano' (urban), 'Solo Rústico' (rural), or 'Espaços não classificados' (unclassified)"
        tests:
          - not_null

      - name: land_category
        description: >
          Detailed land-use category within the classification.
          Urban examples: Espaço Urbanizado, Espaço Urbanizável, Espaço de Uso Especial.
          Rural examples: Espaço Agrícola, Espaço Florestal, Aglomerado Rural.
        tests:
          - not_null

      - name: land_designation
        description: "Full designation text from the PDM planning map (Planta de Ordenamento), trimmed"

      - name: area_ha
        description: "Polygon area in hectares as reported by CRUS"

      - name: map_scale
        description: "Scale of the PDM planning map (e.g. '1/10000', '1/25000')"

      - name: pdm_publication_date
        description: "Publication date of the municipality's active PDM"

      - name: geom
        description: "Polygon geometry in EPSG:3763 (PT-TM06/ETRS89)"
        tests:
          - not_null

      - name: geom_wgs84
        description: "Polygon geometry reprojected to EPSG:4326 (WGS84) for spatial joins with listings"

      - name: _source_url
        description: "MinIO object path of the source GeoJSON file"

      - name: _load_timestamp
        description: "Timestamp when the row was loaded into the bronze table"
