version: 2

sources:
  - name: bronze_regulatory
    database: house4house
    schema: bronze_regulatory
    tables:
      - name: raw_crus_national_ogc
        description: >
          CRUS (Carta do Regime de Uso do Solo) land-use polygons from the DGTERRITÓRIO
          OGC API (`ogcapi.dgterritorio.gov.pt/collections/crus`). Nationally standardized
          land-use classification extracted from each municipality's active PDM. National
          coverage (~236k polygons, replaces the legacy per-município WFS path).
          CRS: EPSG:3763 (PT-TM06/ETRS89) — transformed on insert from the OGC API's native EPSG:4326.
          Source: pipelines/gis/crus_ogc/crus_ogc_bronze_dag.py
        columns:
          - name: feature_id
            description: "OGC API feature `fid` (global integer, not unique per-municipality)"
          - name: municipality_code
            description: "4-digit DTCC municipality code (e.g. 0105 = Aveiro, 1106 = Lisboa). Derived from `LPAD(properties.dtcc, 4, '0')`."
          - name: municipality_name
            description: "Municipality name (e.g. 'Aveiro', 'Lisboa') from properties.municipio"
          - name: classe
            description: "Land classification from properties.classe_2021: 'Solo Urbano', 'Solo Rústico', or 'Espaços não classificados'"
          - name: categoria
            description: "Land-use category from properties.categoria_2021 (e.g. Espaço Agrícola, Espaço Urbanizado, Espaço Florestal)"
          - name: designacao
            description: "Full designation text from properties.classificacao_e_qualificacao (Planta de Ordenamento)"
          - name: area_ha
            description: "Polygon area in hectares from properties.area_ha"
          - name: escala
            description: "Map scale of the planning map from properties.escala_origem (e.g. '1/10000', '1/25000')"
          - name: data_publicacao_pdm
            description: "Publication date of the municipality's active PDM from properties.data_pub_origem"
          - name: fonte
            description: "Data source attribution from properties.fonte (e.g. 'CM - Vectorial e Raster')"
          - name: autor
            description: "Data author from properties.autor (typically 'DGT' for DGTERRITÓRIO)"
          - name: situacao_pdm
            description: "PDM status from properties.situacao_pdm — new in OGC, not in legacy WFS"
          - name: registo_ou_deposito
            description: "Registry/deposit reference from properties.registo_ou_deposito — new in OGC, not in legacy WFS"
          - name: geom
            description: "Polygon geometry in EPSG:3763 (PT-TM06/ETRS89), transformed from the OGC's 4326 on insert"
          - name: _source_url
            description: "MinIO object path of the source GeoJSON file"
          - name: _load_timestamp
            description: "Timestamp when the row was loaded into PostGIS"

      - name: raw_srup_ic
        description: >
          SRUP Imóveis Classificados (heritage sites) from DGTERRITÓRIO WFS.
          National endpoint — includes both protection zones (polygons) and
          point locations. Properties stored as JSONB.
          CRS: EPSG:3763 (PT-TM06/ETRS89).
          Source: pipelines/gis/srup/srup_bronze_dag.py
        columns:
          - name: feature_id
            description: "Feature ID from WFS"
          - name: category
            description: "SRUP category key: 'ic'"
          - name: feature_type
            description: "WFS feature type identifier"
          - name: properties
            description: "All WFS properties as JSONB (21 fields including CLASSIFICACAO, DESIGNACAO, MUNICIPIOS, SERVIDAO, etc.)"
          - name: geom
            description: "Geometry in EPSG:3763 (GeometryCollection for zones, Point for locations)"
          - name: _source_url
            description: "MinIO object path of the source GeoJSON file"
          - name: _load_timestamp
            description: "Timestamp when the row was loaded into PostGIS"

      - name: raw_srup_ran_ogc
        description: >
          SRUP Reserva Agrícola Nacional (agricultural reserve) from the DGTERRITÓRIO
          OGC API (`ogcapi.dgterritorio.gov.pt/collections/srup_ran`). National coverage.
          Properties stored as JSONB with lowercase snake_case keys (differs from the
          retired legacy WFS path which used uppercase PT all-caps).
          CRS: EPSG:3763 (PT-TM06/ETRS89), transformed on insert from the OGC's 4326.
          Source: pipelines/gis/srup_ogc/srup_ogc_bronze_dag.py (omnibus loader, layer `srup_ran_ogc`)
        columns:
          - name: feature_id
            description: "OGC feature id"
          - name: layer_name
            description: "Omnibus loader layer label (e.g. `srup_ran_ogc`)"
          - name: properties
            description: "OGC properties as JSONB. Known keys: municipios, servidao, designacao, tipologia, lei_tipo, serv_dr, serv_data, serv_lei, serv_hiperligacao."
          - name: geom
            description: "Geometry in EPSG:3763"
          - name: _source_url
            description: "MinIO object path of the source GeoJSON file"
          - name: _load_timestamp
            description: "Timestamp when the row was loaded into PostGIS"

      - name: raw_srup_dph
        description: >
          SRUP Domínio Público Hídrico (public water domain) from DGTERRITÓRIO WFS.
          National endpoint — conditioned and prohibited occupation zones along waterways.
          Properties stored as JSONB.
          CRS: EPSG:3763 (PT-TM06/ETRS89).
          Source: pipelines/gis/srup/srup_bronze_dag.py
        columns:
          - name: feature_id
            description: "Feature ID from WFS"
          - name: category
            description: "SRUP category key: 'dph'"
          - name: feature_type
            description: "WFS feature type identifier"
          - name: properties
            description: "All WFS properties as JSONB (18 fields including DESIGNACAO, MUNICIPIOS, SERVIDAO, etc.)"
          - name: geom
            description: "Geometry in EPSG:3763 (Polygon or GeometryCollection)"
          - name: _source_url
            description: "MinIO object path of the source GeoJSON file"
          - name: _load_timestamp
            description: "Timestamp when the row was loaded into PostGIS"

      # ── SRUP OGC layers (added 2026-05-14, Sprint-08 Activity 6 PR 2) ──
      # All share the same bronze shape: feature_id / layer_name / properties
      # (JSONB, lowercase snake_case keys) / geom (EPSG:3763) / _source_url /
      # _load_timestamp. Source: pipelines/gis/srup_ogc/ omnibus loader.
      # Full per-key properties breakdown: wiki/concepts/srup-properties-schema.md

      - name: raw_srup_ren_areal
        description: >
          SRUP Reserva Ecológica Nacional — areal zones (MultiPolygon).
          National coverage. JSONB properties (24 keys). CRS EPSG:3763.
        columns:
          - name: feature_id
            description: "OGC feature id"
          - name: layer_name
            description: "Omnibus loader layer label"
          - name: properties
            description: "JSONB. Keys: area_ha, classifica, codigoobje, concelho, designacao, dinamica, dtcc, fid, fid_1, geom_autor, geom_data, geom_rigor, id, lei_tipo, peca_grafi, regiao, reg_n, serv_data, serv_dr, serv_hiper, servidao, serv_lei, tipologia, tutela"
          - name: geom
            description: "MultiPolygon in EPSG:3763"
          - name: _source_url
            description: "MinIO object path of the source GeoJSON file"
          - name: _load_timestamp
            description: "Timestamp when the row was loaded into PostGIS"

      - name: raw_srup_ren_linear
        description: >
          SRUP Reserva Ecológica Nacional — linear watercourse lines/beds
          (MultiLineString). National coverage. JSONB properties (20 keys). CRS EPSG:3763.
        columns:
          - name: feature_id
            description: "OGC feature id"
          - name: layer_name
            description: "Omnibus loader layer label"
          - name: properties
            description: "JSONB. Keys: classifica, codigoobje, compriment, concelho, designacao, dinamica, dtcc, estado, fid, geometria_, id, id1, id_servdao, id_servida, lei_tipo, regiao, serv_data, servidao, serv_lei, tipologia"
          - name: geom
            description: "MultiLineString in EPSG:3763"
          - name: _source_url
            description: "MinIO object path of the source GeoJSON file"
          - name: _load_timestamp
            description: "Timestamp when the row was loaded into PostGIS"

      - name: raw_srup_zpe
        description: >
          SRUP Rede Natura 2000 — Zonas de Proteção Especial (birds).
          National coverage. JSONB properties (10 keys). CRS EPSG:3763.
        columns:
          - name: feature_id
            description: "OGC feature id"
          - name: layer_name
            description: "Omnibus loader layer label"
          - name: properties
            description: "JSONB. Keys: designacao, fid, lei_tipo, municipios, serv_data, serv_dr, serv_hiperligacao, servidao, serv_lei, tipologia"
          - name: geom
            description: "MultiPolygon in EPSG:3763"
          - name: _source_url
            description: "MinIO object path of the source GeoJSON file"
          - name: _load_timestamp
            description: "Timestamp when the row was loaded into PostGIS"

      - name: raw_srup_zec
        description: >
          SRUP Rede Natura 2000 — Zonas Especiais de Conservação (habitats).
          National coverage. JSONB properties (10 keys). CRS EPSG:3763.
        columns:
          - name: feature_id
            description: "OGC feature id"
          - name: layer_name
            description: "Omnibus loader layer label"
          - name: properties
            description: "JSONB. Keys: designacao, fid, lei_tipo, municipios, serv_data, serv_dr, serv_hiperligacao, servidao, serv_lei, tipologia"
          - name: geom
            description: "MultiPolygon in EPSG:3763"
          - name: _source_url
            description: "MinIO object path of the source GeoJSON file"
          - name: _load_timestamp
            description: "Timestamp when the row was loaded into PostGIS"

      - name: raw_srup_areas_protegidas
        description: >
          SRUP Áreas Protegidas (Parque/Reserva Natural, Paisagem Protegida, etc.).
          National coverage. JSONB properties (11 keys). CRS EPSG:3763.
        columns:
          - name: feature_id
            description: "OGC feature id"
          - name: layer_name
            description: "Omnibus loader layer label"
          - name: properties
            description: "JSONB. Keys: codigo, designacao, fid, lei_tipo, municipios, serv_data, serv_dr, serv_hiperligacao, servidao, serv_lei, tipologia"
          - name: geom
            description: "MultiPolygon in EPSG:3763"
          - name: _source_url
            description: "MinIO object path of the source GeoJSON file"
          - name: _load_timestamp
            description: "Timestamp when the row was loaded into PostGIS"

      - name: raw_srup_rede_viaria
        description: >
          SRUP Rede Viária — road servidão zones (zona da estrada corridor).
          National coverage. JSONB properties (11 keys). CRS EPSG:3763.
        columns:
          - name: feature_id
            description: "OGC feature id"
          - name: layer_name
            description: "Omnibus loader layer label"
          - name: properties
            description: "JSONB. Keys: codigo, concelho, designacao, fid, lei_tipo, serv_data, serv_dr, serv_hiper, servidao, serv_lei, tipologia"
          - name: geom
            description: "MultiPolygon in EPSG:3763 (road corridor, not the non-aedificandi servidão — see srup-constraint-model.md)"
          - name: _source_url
            description: "MinIO object path of the source GeoJSON file"
          - name: _load_timestamp
            description: "Timestamp when the row was loaded into PostGIS"

      - name: raw_srup_rede_eletrica
        description: >
          SRUP Rede Elétrica — power-line faixa de protecção (AT + MAT).
          National coverage. JSONB properties (11 keys). CRS EPSG:3763.
        columns:
          - name: feature_id
            description: "OGC feature id"
          - name: layer_name
            description: "Omnibus loader layer label"
          - name: properties
            description: "JSONB. Keys: concelho, designacao, dtcc, fid, lei_tipo, serv_data, serv_dr, serv_hiperlig, servidao, serv_lei, tipologia"
          - name: geom
            description: "MultiPolygon in EPSG:3763 (~45 m faixa de protecção)"
          - name: _source_url
            description: "MinIO object path of the source GeoJSON file"
          - name: _load_timestamp
            description: "Timestamp when the row was loaded into PostGIS"

      - name: raw_srup_rede_ferroviaria
        description: >
          SRUP Rede Ferroviária — railway line servidão (~20 m non-aedificandi zone).
          National coverage. JSONB properties (11 keys). CRS EPSG:3763.
        columns:
          - name: feature_id
            description: "OGC feature id"
          - name: layer_name
            description: "Omnibus loader layer label"
          - name: properties
            description: "JSONB. Keys: codigo, conselho, designacao, fid, lei_tipo, serv_data, serv_dr, serv_hiper, servidao, serv_lei, tipologia (note `conselho` is a source typo for concelho)"
          - name: geom
            description: "MultiPolygon in EPSG:3763"
          - name: _source_url
            description: "MinIO object path of the source GeoJSON file"
          - name: _load_timestamp
            description: "Timestamp when the row was loaded into PostGIS"

      - name: raw_srup_rede_ferroviaria_estacoes
        description: >
          SRUP Rede Ferroviária — station + halt yard footprints. Same DL 276/2003
          regime as raw_srup_rede_ferroviaria; UNION'd into stg_srup_rede_ferroviaria.
          National coverage. JSONB properties (11 keys). CRS EPSG:3763.
        columns:
          - name: feature_id
            description: "OGC feature id"
          - name: layer_name
            description: "Omnibus loader layer label"
          - name: properties
            description: "JSONB. Keys: codigo, designacao, fid, lei_tipo, municipio, serv_data, serv_dr, serv_hiper, servidao, serv_lei, tipologia"
          - name: geom
            description: "MultiPolygon in EPSG:3763"
          - name: _source_url
            description: "MinIO object path of the source GeoJSON file"
          - name: _load_timestamp
            description: "Timestamp when the row was loaded into PostGIS"

      - name: raw_srup_albufeiras
        description: >
          SRUP Albufeiras de Águas Públicas Classificadas — public-reservoir
          protection zones (protegida / condicionada / livre tiers).
          National coverage. JSONB properties (10 keys). CRS EPSG:3763.
        columns:
          - name: feature_id
            description: "OGC feature id"
          - name: layer_name
            description: "Omnibus loader layer label"
          - name: properties
            description: "JSONB. Keys: designacao, fid, lei_tipo, municipios, serv_data, serv_dr, serv_hiperligacao, servidao, serv_lei, tipologia"
          - name: geom
            description: "MultiPolygon in EPSG:3763"
          - name: _source_url
            description: "MinIO object path of the source GeoJSON file"
          - name: _load_timestamp
            description: "Timestamp when the row was loaded into PostGIS"

      - name: raw_srup_defesa_militar
        description: >
          SRUP Defesa Militar — military servitude zones. UNION'd with
          raw_srup_defesa_militar_zonas into stg_srup_defesa_militar.
          National coverage. JSONB properties (10 keys). CRS EPSG:3763.
        columns:
          - name: feature_id
            description: "OGC feature id"
          - name: layer_name
            description: "Omnibus loader layer label"
          - name: properties
            description: "JSONB. Keys: designacao, fid, lei_tipo, municipios, serv_data, serv_dr, serv_hiperligacao, servidao, serv_lei, tipologia"
          - name: geom
            description: "MultiPolygon in EPSG:3763"
          - name: _source_url
            description: "MinIO object path of the source GeoJSON file"
          - name: _load_timestamp
            description: "Timestamp when the row was loaded into PostGIS"

      - name: raw_srup_defesa_militar_zonas
        description: >
          SRUP Defesa Militar — graduated military servitude zones (Zona 1-4,
          terreno militar). UNION'd into stg_srup_defesa_militar.
          National coverage. JSONB properties (10 keys). CRS EPSG:3763.
        columns:
          - name: feature_id
            description: "OGC feature id"
          - name: layer_name
            description: "Omnibus loader layer label"
          - name: properties
            description: "JSONB. Keys: designacao, fid, lei_tipo, municipios, serv_data, serv_dr, serv_hiper, servidao, serv_lei, tipologia"
          - name: geom
            description: "MultiPolygon in EPSG:3763"
          - name: _source_url
            description: "MinIO object path of the source GeoJSON file"
          - name: _load_timestamp
            description: "Timestamp when the row was loaded into PostGIS"

      - name: raw_srup_aeronautica
        description: >
          SRUP Servidões Aeronáuticas — airport / aerodrome / radio-beacon zones
          (área de desobstrução, servidão, zona protecção edifícios públicos).
          National coverage. JSONB properties (10 keys). CRS EPSG:3763.
        columns:
          - name: feature_id
            description: "OGC feature id"
          - name: layer_name
            description: "Omnibus loader layer label"
          - name: properties
            description: "JSONB. Keys: designacao, fid, lei_tipo, municipios, serv_data, serv_dr, serv_hiperligacao, servidao, serv_lei, tipologia"
          - name: geom
            description: "MultiPolygon in EPSG:3763"
          - name: _source_url
            description: "MinIO object path of the source GeoJSON file"
          - name: _load_timestamp
            description: "Timestamp when the row was loaded into PostGIS"

      - name: raw_bupi
        description: >
          BUPI simplified cadastral property parcels (RGG) from dados.gov.pt.
          ~3.25M MultiPolygon parcels covering 152 municipalities in continental Portugal.
          Georeferenced property boundaries from the BUPi registration system.
          GPKG layer: rgg_{date}_opendata (auto-detected). Monthly refresh. EPSG:3763.
          Source: pipelines/gis/bupi/bupi_bronze_dag.py
        columns:
          - name: processoid
            description: "BUPi process identifier (unique integer)"
          - name: numeromatriz
            description: "Property tax matrix number (string, may contain commas for multiple entries)"
          - name: dicofre
            description: "6-digit parish code: distrito(2) + concelho(2) + freguesia(2)"
          - name: concelho
            description: "Municipality name (e.g. 'Pombal', 'Bragança')"
          - name: freguesia
            description: "Parish name"
          - name: area_m2
            description: "Parcel area in square metres"
          - name: geom
            description: "MultiPolygon in EPSG:3763 (PT-TM06/ETRS89)"
          - name: _source_url
            description: "MinIO object path of the source GeoPackage file"
          - name: _load_timestamp
            description: "Timestamp when the row was loaded into PostGIS"

      - name: raw_cadastro
        description: >
          Cadastro Predial (Property Cadastre) parcel boundaries from DGTERRITÓRIO OGC API.
          Official legal property parcels with cadastral references and areas.
          Coverage: partial (municipalities surveyed 2000-2007).
          GeoJSON ingested via API pagination, transformed from EPSG:4326 to EPSG:3763 on insert.
          Source: pipelines/gis/cadastro/cadastro_bronze_dag.py
        columns:
          - name: inspireid
            description: "EU INSPIRE standard identifier for the parcel"
          - name: nationalcadastralreference
            description: "Unique cadastral ID (e.g. AAA000338225)"
          - name: areavalue
            description: "Official parcel area in m²"
          - name: administrativeunit
            description: "6-digit DTCC code (distrito+município+freguesia)"
          - name: label
            description: "Human-readable parcel label"
          - name: validfrom
            description: "Start of validity period"
          - name: validto
            description: "End of validity period (NULL if still valid)"
          - name: beginlifespanversion
            description: "Record creation date"
          - name: geom
            description: "MultiPolygon in EPSG:3763 (PT-TM06/ETRS89)"
          - name: _source_url
            description: "MinIO object path of the source GeoJSON file"
          - name: _load_timestamp
            description: "Timestamp when the row was loaded into PostGIS"

      - name: raw_sce_certificates
        description: >
          SCE energy certificates scraped from the sce.pt portal — includes
          Pre-Energy Certificates (PCE), final Energy Certificates (CE), and
          DCR documents. Each row is one document per apartment/fraction.
          PCEs are a proxy for upcoming new construction; CEs mark
          construction completion. The `tipo_documento` column distinguishes
          document type. Coverage: Aveiro, Coimbra, Leiria (3 distritos).
          Source: pipelines/scraping/sce/sce_bronze_dag.py
        columns:
          - name: doc_number
            description: "SCE document number (e.g. SCE0000399459443)"
          - name: morada
            description: "Address from the search results table"
          - name: fracao
            description: "Fraction from the search results table (often '0')"
          - name: localidade
            description: "Locality name"
          - name: concelho
            description: "Municipality name"
          - name: estado
            description: "Certificate status (e.g. 'Válido', 'Revogado')"
          - name: doc_substituto
            description: "Replacement document number (if superseded)"
          - name: tipo_documento
            description: "Document type (e.g. 'Pré-Certificado', 'Certificado')"
          - name: classe_energetica
            description: "Energy class (A+, A, B, B-, C, D, E, F) from popup image"
          - name: data_emissao
            description: "Issuance date in YYYY/MM/DD format"
          - name: data_validade
            description: "Validity date in YYYY/MM/DD format"
          - name: freguesia_detail
            description: "Parish name from the detail popup"
          - name: perito_num
            description: "Qualified expert number (e.g. PQ00883)"
          - name: conservatoria
            description: "Land registry office name"
          - name: sob_o_num
            description: "Land registry entry number"
          - name: artigo_matricial
            description: "Property tax matrix article number"
          - name: fracao_autonoma
            description: "Autonomous fraction from the detail popup"
          - name: query_distrito
            description: "Distrito code used in the query"
          - name: query_concelho
            description: "Concelho code used in the query"
          - name: query_freguesia
            description: "Freguesia code used in the query"
          - name: _scrape_date
            description: "Date the data was scraped"
          - name: _batch_id
            description: "Batch identifier for the load run"
          - name: _ingested_at
            description: "Timestamp when the row was loaded into PostGIS"
          - name: _minio_path
            description: "MinIO object path of the source JSONL file"
