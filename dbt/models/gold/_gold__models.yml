version: 2

models:
  - name: xref_publico_dgeec
    description: >
      Bridge table: Público school id (`eid`) ↔ DGEEC 6-digit
      `codigo_escola` (CODESCME). Resolves Open Q #2 from
      [[pt-education-amenity-pillar]]. One row per `publico_eid`;
      unmatched Público schools surface with `codigo_dgeec` NULL and
      `match_method='unmatched'`. Powered by two empirically-tuned
      paths (probe locked 2026-06-09): (1) `direct_uo_fuzzy` for 9ano
      schools with `codigo_uo_dgeec` populated — UO-restricted name
      similarity, 100% confident at avg sim=0.992 across 921 schools;
      (2) `fuzzy_spatial` for all sec + 9ano-without-coduo — ST_DWithin
      500m + name similarity ≥ 0.6. The `id_publico ↔ DGEEC` prefix
      probe was tested and matches 0/661 sec schools (Público's `id` is
      its own short code, unrelated to DGEEC); explicitly NOT in the
      algorithm.
    columns:
      - name: publico_eid
        description: "Público internal school id. PK."
        tests:
          - not_null
          - unique
      - name: kind
        description: "'sec' (secundário) or '9ano' (3º ciclo). Sec rows are always 'fuzzy_spatial' or 'unmatched' (codigo_uo_dgeec is always NULL for sec)."
        tests:
          - not_null
          - accepted_values: {values: ['sec', '9ano']}
      - name: codigo_dgeec
        description: "DGEEC 6-digit codigo_escola (CODESCME) — the per-school code from rede_escolar. NULL when match_method='unmatched' (school is in Público but not in the rede_escolar register, typically small privates / IPSS)."
      - name: match_method
        description: >
          'direct_uo_fuzzy' (Stage 1 — 9ano UO-restricted, ~921 rows, implicit confidence=high);
          'ensemble_high' (Stage 2 — ≥3 of 4 algorithms agree AND guards passed: sim≥0.7 AND dist≤3km);
          'ensemble_medium' (Stage 2 — ≥3 votes with guards failed, OR 2 votes with guards passed);
          'ensemble_low' (Stage 2 — exactly 2 votes with guards failed; weak vote + weak evidence);
          'unmatched' (no consensus).
        tests:
          - not_null
          - accepted_values: {values: ['direct_uo_fuzzy', 'ensemble_high', 'ensemble_medium', 'ensemble_low', 'unmatched']}
      - name: match_confidence
        description: >
          'high' (Stage 1 OR ≥3 ensemble votes with sim≥0.7 + dist≤3km guards passed);
          'medium' (≥3 votes but guards failed [shared-prefix or far-distance trap], OR exactly 2 votes with guards passed);
          'low' (exactly 2 votes with guards failed — eyeball before trusting);
          'unmatched' (no consensus).
          Downstream gold (dim_school) filters on this — typically high-only for strict joins, high+medium for canonical coverage, all-but-unmatched for max recall.
        tests:
          - not_null
          - accepted_values: {values: ['high', 'medium', 'low', 'unmatched']}
      - name: votes
        description: "Number of algorithms (out of 4: trigram + Levenshtein + Jaccard + phonetic) that picked the chosen codigo_dgeec. 4 for Stage 1 (all agree by construction). 0 for unmatched."
        tests: [not_null]
      - name: match_score
        description: "Trigram similarity (pg_trgm) of unaccent(lower(publico.nome)) vs unaccent(lower(dgeec.nome)). The 'audit' algorithm — even when other algorithms drove the ensemble decision, this column lets you eyeball name closeness. NULL when unmatched."
      - name: match_distance_m
        description: "Geodesic distance in meters (EPSG:3763) between Público and DGEEC school points. NULL when unmatched. For direct_uo_fuzzy rows the distance can be >2km because the UO scope, not spatial, gates the match."

  - name: dim_school
    description: >
      Canonical gold dim of every Portuguese school across all 5 levels
      (KG → universidade), feeds listing_school_features. Single-table
      design with `school_type` discriminator + `codigo_dgeec` PK
      accepting both 4-digit higher-ed UO codes and 6-digit basic/sec
      CODESCME codes (disjoint by length, 0 collisions). Resolves
      [[pt-education-amenity-pillar]] Open Q #5. UNION ALL of
      stg_rede_escolar (~7,796 schools) + stg_dgeec_ens_sup (321 UOs).
      Time-series rankings live in sibling [[fact-school-ranking]] —
      dim_school is a current-snapshot dim per Kimball.
    columns:
      - name: codigo_dgeec
        description: "DGEEC code — 6-digit CODESCME for basic_sec (e.g. '800394'); 4-digit codigo_unidade_organica for higher_ed (e.g. '0100'). Text, zero-padded. PK."
        tests:
          - not_null
          - unique
      - name: school_type
        description: "Discriminator: 'basic_sec' or 'higher_ed'."
        tests:
          - not_null
          - accepted_values: {values: ['basic_sec', 'higher_ed']}
      - name: nome
        description: "School name (basic_sec) or full Unidade Orgânica name including parent institution (higher_ed, e.g. 'Universidade do Porto - Faculdade de Medicina'). Trimmed."
        tests: [not_null]
      - name: tipologia
        description: "rede_escolar tipologia — 'Escola Básica', 'Escola Básica e Secundária', etc. NULL for higher_ed AND for 820 basic_sec rows where source is empty (typically Pré-escolar/Especial/Extra-escolar; level info still derivable from `ciclo` and the `has_*` flags)."
      - name: ciclo
        description: "rede_escolar ciclo label, semicolon-separated for multi-level schools (e.g. 'Pré-escolar;1º Ciclo'). NULL for higher_ed."
      - name: natureza
        description: "Raw rede_escolar natureza_institucional ('Redes dos ministérios', 'Particular', 'IPSS ou equiparada', 'Misericórdia de Lisboa'). NULL for higher_ed — see natureza_tipo."
      - name: natureza_tipo
        description: "Raw higher-ed combination 'Ensino Superior {Público|Privado} - {Universitário|Politécnico}' (+ Militar/Policial variants). NULL for basic_sec."
      - name: natureza_publico_privado
        description: "Harmonized 'Pública' / 'Privada' / NULL across both school_types. Derived from natureza (basic_sec: 'Redes dos ministérios'→Pública; Particular/IPSS/Misericórdia→Privada) and natureza_tipo (higher_ed: 'Ensino Superior Público%'→Pública, 'Ensino Superior Privado%'→Privada). Use this for school-type-agnostic filtering."
        tests:
          - accepted_values: {values: ['Pública', 'Privada']}
      - name: has_kg
        description: "Boolean: school serves pré-escolar (kindergarten). Parsed from ciclo for basic_sec; false for higher_ed."
        tests: [not_null]
      - name: has_basic_1
        description: "Boolean: school serves 1º ciclo. Parsed from ciclo. False for higher_ed."
        tests: [not_null]
      - name: has_basic_2
        description: "Boolean: school serves 2º ciclo."
        tests: [not_null]
      - name: has_basic_3
        description: "Boolean: school serves 3º ciclo (where 9ano Provas Finais are taken). Use with fact_school_ranking.kind='9ano' for ranking trends."
        tests: [not_null]
      - name: has_sec
        description: "Boolean: school serves secundário (where exames nacionais are taken). Use with fact_school_ranking.kind='sec' for ranking trends."
        tests: [not_null]
      - name: has_higher_ed
        description: "Boolean: true for all higher_ed rows; false for basic_sec. Symmetric companion to has_kg/has_basic_*/has_sec."
        tests: [not_null]
      - name: higher_ed_type
        description: "Higher-ed sub-type: 'universidade' / 'politecnico' / 'militar_universitario' / 'militar_politecnico'. NULL for basic_sec."
      - name: publico_eid_sec
        description: "For audit: the Público eid that bridges to this school for sec ranking (best confidence tier when multiple eids exist). NULL if no sec ranking link."
      - name: match_confidence_sec
        description: "xref_publico_dgeec confidence tier for the sec match ('high'/'medium'/'low'). NULL if no sec link. Downstream filters strict joins by ('high')."
      - name: publico_eid_9ano
        description: "For audit: the Público eid that bridges to this school for 9ano ranking."
      - name: match_confidence_9ano
        description: "xref confidence tier for the 9ano match."
      - name: geom_3763
        description: "Point geometry in EPSG:3763 (PT-TM06) for metric distance to listings."
        tests: [not_null]
      - name: geom_4326
        description: "Point geometry in EPSG:4326 for display + WGS84 joins."
        tests: [not_null]

  - name: fact_school_ranking
    description: >
      Time-series ranking fact across all 3 signals (Público sec + Público
      9ano + DGES higher-ed). One row per (codigo_dgeec, kind, year, phase).
      Join to [[dim-school]] via codigo_dgeec for spatial + identity.
      kind='sec' carries Público secundário (0-20 scale, 2018-2024);
      kind='9ano' carries Público 3º ciclo Provas Finais (0-5 scale,
      2018-19 + 2022-24); kind='higher_ed' carries DGES vagas-weighted
      nota último colocado per UO (0-200 scale, 2014-2025 × 3 fases).
      Counter-part to [[dim-school]] which holds current snapshot only.
    columns:
      - name: codigo_dgeec
        description: "FK to dim_school.codigo_dgeec. 6-digit CODESCME for sec/9ano; 4-digit UO code for higher_ed."
        tests: [not_null]
      - name: kind
        description: "Ranking kind: 'sec' / '9ano' / 'higher_ed'."
        tests:
          - not_null
          - accepted_values: {values: ['sec', '9ano', 'higher_ed']}
      - name: year
        description: "Ranking year. Sec: 2018-2024. 9ano: 2018-2019 + 2022-2024 (COVID gap). higher_ed: 2014-2025."
        tests: [not_null]
      - name: phase
        description: "Higher-ed CNA phase (1/2/3). NULL for sec/9ano (single-phase rankings)."
      - name: ranking_score
        description: "Score on the kind's native scale: 0-20 for sec, 0-5 for 9ano, 0-200 for higher_ed (nota último colocado weighted by vagas)."
      - name: ranking_position
        description: "National rank by the score within (year, kind). 1 = best in that cohort. NULL for higher_ed (DGES doesn't publish UO-level position rankings)."
      - name: match_confidence
        description: "xref_publico_dgeec confidence tier for sec/9ano rows ('high'/'medium'/'low'). NULL for higher_ed (DGES codes ARE DGEEC UO codes, no bridge needed)."
      - name: publico_eid
        description: "For audit: Público's internal school id (sec/9ano rows). NULL for higher_ed."
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [codigo_dgeec, kind, year, phase]

  - name: dim_geography
    description: >
      Geography dimension at the freguesia (parish) level.
      Combines CAOP administrative boundaries with Census 2021 demographics from BGRI.
      3,049 rows (mainland Portugal). Foundation for all spatial joins.
      Sources: stg_caop_freguesias (boundaries), stg_bgri_freguesia_agg (demographics).
      GIST-indexed on both freguesia_geom (4326) and freguesia_geom_pt (3763).
    columns:
      # ── Identity ────────────────────────────────────────────────────────────
      - name: geo_key
        description: "Surrogate integer key via ROW_NUMBER ordered by freguesia_code. Deterministic across rebuilds"
        tests:
          - unique
          - not_null

      - name: freguesia_code
        description: "6-digit DTMNFR code (distrito 2 + municipio 2 + freguesia 2). Natural business key"
        tests:
          - unique
          - not_null

      # ── Administrative hierarchy ────────────────────────────────────────────
      - name: distrito_code
        description: "2-digit distrito code (e.g. '01' for Aveiro). Derived from LEFT(dtmnfr, 2) in stg_caop_freguesias"
        tests:
          - not_null

      - name: distrito_name
        description: "Distrito name (e.g. 'Aveiro')"

      - name: concelho_code
        description: "4-digit concelho/municipality code (e.g. '0105' for Aveiro). Derived from LEFT(dtmnfr, 4)"
        tests:
          - not_null

      - name: concelho_name
        description: "Concelho/municipality name (e.g. 'Aveiro')"

      - name: freguesia_name
        description: "Freguesia/parish name (e.g. 'Glória e Vera Cruz')"
        tests:
          - not_null

      # ── NUTS classification ─────────────────────────────────────────────────
      - name: nut_i
        description: "NUTS I region (e.g. 'Continente')"
      - name: nut_ii
        description: "NUTS II region (e.g. 'Centro')"
      - name: nut_iii
        description: "NUTS III region (e.g. 'Região de Aveiro')"

      - name: postal_code_4
        description: "4-digit postal code prefix. Currently NULL — placeholder for future enrichment"

      # ── Geometry ────────────────────────────────────────────────────────────
      - name: freguesia_geom
        description: "MultiPolygon boundary in EPSG:4326 (WGS84). GIST-indexed. Used for ST_Within spatial joins with listing coordinates"
        tests:
          - not_null

      - name: freguesia_geom_pt
        description: "MultiPolygon boundary in EPSG:3763 (PT-TM06/ETRS89). GIST-indexed. Used for metric area/distance calculations"
        tests:
          - not_null

      - name: centroid
        description: "POINT centroid of freguesia in EPSG:4326. Computed via ST_Centroid(geom_4326)"

      - name: area_km2
        description: "Parish area in km2 (area_ha / 100, rounded to 3 decimals)"
        tests:
          - not_null

      # ── Census 2021 demographics ────────────────────────────────────────────
      - name: population_2021
        description: "Total population from BGRI Census 2021. SUM(n_individuos) at freguesia level. NULL for 302 CAOP codes not in BGRI"

      - name: households_2021
        description: "Total private households from BGRI Census 2021. NULL for codes not in BGRI"

      - name: pop_density_km2
        description: "Population density: population_2021 / area_km2. Rounded to 2 decimals. NULL when area is 0"

      - name: median_age
        description: "Weighted average age from BGRI age bands. Not a true median — approximation using midpoints (7, 19.5, 44.5, 77.5)"

      - name: foreign_resident_pct
        description: "Percentage of foreign residents. Currently NULL — deferred until INE Census indicators are fetched with district-level chunking"

      # ── SCD Type 2 metadata ─────────────────────────────────────────────────
      - name: source_caop_year
        description: "CAOP release year from dbt_project.yml var('caop_year')"
      - name: valid_from
        description: "SCD validity start date (CAOP year Jan 1st)"
      - name: valid_to
        description: "SCD validity end date. NULL = currently valid"
      - name: is_current
        description: "Always TRUE — SCD Type 2 not yet implemented (single CAOP version)"

  - name: dim_property_type
    description: >
      Static dimension mapping Idealista raw property_type + property_subtype
      to standardized Portuguese labels and groupings. 16 rows defined as SQL VALUES clause.
      Two-pass join in unified_listings: exact match (type + subtype), then fallback (type only where subtype IS NULL).
    columns:
      - name: property_type_key
        description: "Surrogate integer key (1-16). Stable across rebuilds"
        tests:
          - unique
          - not_null
      - name: source_type
        description: "Raw Idealista property_type (e.g. 'flat', 'chalet', 'countryHouse', 'homes')"
        tests:
          - not_null
      - name: source_subtype
        description: "Raw Idealista property_subtype (e.g. 'studio', 'duplex', 'independantHouse'). NULL for type-only fallback rows"
      - name: tipo
        description: "Portuguese property type label (e.g. 'Apartamento', 'Moradia', 'Moradia Rustica', 'Habitacao')"
        tests:
          - not_null
      - name: subtipo
        description: "Portuguese subtype label (e.g. 'Duplex', 'Geminada', 'Quinta'). NULL for type-only entries"
      - name: type_group
        description: "Broad grouping for market segmentation: 'Apartamento' or 'Moradia'"
        tests:
          - not_null
          - accepted_values:
              values: ['Apartamento', 'Moradia']

  - name: ref_imt_brackets
    description: >
      IMT (Imposto Municipal sobre Transmissoes) transfer tax brackets.
      Progressive rates by buyer type: primary_residence (6 brackets, 0-8%),
      secondary/investment (5 brackets, 1-7.5%), other_urban (1 flat rate 6.5%),
      rural (1 flat rate 5%). 16 rows total.
      Source: Autoridade Tributaria, 2025. Materialized as SQL VALUES clause.
    columns:
      - name: bracket_id
        description: "Unique bracket identifier (1-16)"
        tests:
          - unique
          - not_null
      - name: bracket_type
        description: "Buyer/property category: primary_residence, secondary, other_urban, rural"
        tests:
          - not_null
          - accepted_values:
              values: ['primary_residence', 'secondary', 'other_urban', 'rural']
      - name: min_value
        description: "Bracket lower bound (EUR, inclusive). 0.00 for first bracket"
      - name: max_value
        description: "Bracket upper bound (EUR, exclusive). 999999999.99 for top bracket"
      - name: rate
        description: "Marginal tax rate as decimal (e.g. 0.0200 = 2%)"
        tests:
          - not_null
      - name: deduction
        description: "Fixed deduction amount in EUR for progressive calculation"
      - name: valid_year
        description: "Year these brackets apply (2025)"
        tests:
          - not_null

  - name: ref_imi_rates
    description: >
      IMI (Imposto Municipal sobre Imoveis) annual property tax rates per municipality.
      Urban rates set by each municipality (range 0.30%-0.45%); rural rate is 0.80% nationwide.
      278 mainland municipalities matching dim_geography.concelho_code.
      Source: Portal das Financas, 2025. Materialized as SQL VALUES clause.
      Join to listings via dim_geography.concelho_code for tax cost estimation.
    columns:
      - name: municipality_code
        description: "4-digit concelho code matching dim_geography.concelho_code (e.g. '0105' for Aveiro)"
        tests:
          - unique
          - not_null
      - name: municipality_name
        description: "Municipality name (e.g. 'Aveiro')"
        tests:
          - not_null
      - name: urban_rate
        description: "Annual IMI rate for urban properties as decimal (e.g. 0.0035 = 0.35%). Applied to property tax value (VPT)"
        tests:
          - not_null
      - name: rural_rate
        description: "Annual IMI rate for rural properties as decimal. Always 0.0080 (0.80%) nationwide"
        tests:
          - not_null
      - name: valid_year
        description: "Year these rates apply (2025)"
        tests:
          - not_null

  - name: dim_constraint_severity
    description: >
      SRUP constraint severity dimension — maps (constraint_code, zone_type)
      to a 0-3 construction severity, the managing authority, the legal basis,
      and the spatial buffer to apply. 27 rows across 14 SRUP constraint layers.
      Materialized as a SQL VALUES clause. Queried by gold.fn_assess_polygon
      (sprint-09) after each per-layer ST_Intersects. See
      wiki/concepts/srup-constraint-model.md for the full model.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - constraint_code
            - zone_type
    columns:
      - name: constraint_severity_key
        description: "Surrogate integer key via ROW_NUMBER ordered by (constraint_code, zone_type). Deterministic across rebuilds"
        tests:
          - unique
          - not_null
      - name: constraint_code
        description: "SRUP layer code: RAN, REN_areal, REN_linear, IC, DPH, ZPE, ZEC, AreasProtegidas, RedeViaria, RedeEletrica, RedeFerroviaria, Albufeiras, DefesaMilitar, Aeronautica"
        tests:
          - not_null
      - name: zone_type
        description: "Per-feature relationship attribute (e.g. non_aedificandi, zona_protecao, servidao_rodoviaria_ip). Derived by each stg_srup_* model from servidao/tipologia/geometry type"
        tests:
          - not_null
      - name: severity
        description: "Construction severity: 3=hard gate (prohibited as a rule), 2=conditioned (needs prior opinion), 1=advisory, 0=no constraint"
        tests:
          - not_null
          - accepted_values:
              values: [0, 1, 2, 3]
      - name: category
        description: "Constraint family: agricultural, ecological, heritage, water_domain, conservation, infrastructure, military, aviation"
        tests:
          - not_null
      - name: buffer_m
        description: "Metres to ST_Buffer the layer geom before intersection. 0 where the polygon already IS the servidão; 10 for REN_linear + active/station RedeFerroviaria; 50/35/20 for RedeViaria by class"
        tests:
          - not_null
      - name: buffer_ref
        description: "'geom' = buffer the stored geometry directly; 'axis' = buffer_m is from the road axis, fn_assess_polygon subtracts the per-feature half-width first (RedeViaria only)"
        tests:
          - not_null
          - accepted_values:
              values: ['geom', 'axis']
      - name: legal_basis
        description: "Governing Decreto-Lei + article range (e.g. 'DL 73/2009 art. 21-23')"
        tests:
          - not_null
      - name: requires_prior_opinion
        description: "TRUE if a legal exception path via an authority opinion/authorization exists"
        tests:
          - not_null
      - name: authority
        description: "Entity that issues the opinion/authorization (e.g. APA, ICNF, Infraestruturas de Portugal). 'n/a' for severity-0 rows"
        tests:
          - not_null
      - name: is_hard_gate
        description: "severity >= 3"
        tests:
          - not_null
      - name: is_conditioned
        description: "severity = 2"
        tests:
          - not_null
      - name: is_advisory
        description: "severity = 1"
        tests:
          - not_null
      - name: severity_label
        description: "Human-readable severity: 'Hard gate' / 'Conditioned' / 'Advisory' / 'No constraint'"
        tests:
          - not_null
      - name: display_color
        description: "Hex color for the Atlas Inspector by severity (3 #d32f2f, 2 #f57c00, 1 #fbc02d, 0 #9e9e9e)"
        tests:
          - not_null

  - name: property_location_scores
    description: >
      Transport proximity scores per listing. For each mode (rail, bus, tram, air, ferry),
      finds the nearest stop via LATERAL + KNN on EPSG:3763 and applies exponential decay
      scoring with variable decay constants. Composite transport_score is a weighted sum.
      ~16K rows (one per listing with valid geometry). Full table rebuild.
      Upgrade path: pgRouting network distances + OSRM travel times in Sprint 7.
    columns:
      - name: listing_key
        description: "FK to unified_listings. One row per listing"
        tests:
          - unique
          - not_null
      - name: geo_key
        description: "FK to dim_geography via unified_listings"
      - name: nearest_rail_m
        description: "Crow-flies distance (meters) to nearest rail station"
      - name: nearest_rail_name
        description: "Name of nearest rail station"
      - name: nearest_bus_m
        description: "Crow-flies distance (meters) to nearest bus stop"
      - name: nearest_bus_name
        description: "Name of nearest bus stop"
      - name: nearest_tram_m
        description: "Crow-flies distance (meters) to nearest tram stop"
      - name: nearest_tram_name
        description: "Name of nearest tram stop"
      - name: nearest_air_m
        description: "Crow-flies distance (meters) to nearest airport"
      - name: nearest_air_name
        description: "Name of nearest airport"
      - name: nearest_ferry_m
        description: "Crow-flies distance (meters) to nearest ferry terminal"
      - name: nearest_ferry_name
        description: "Name of nearest ferry terminal"
      - name: rail_score
        description: "Exponential decay score (0-1). Decay constant: 800m"
        tests: [not_null]
      - name: bus_score
        description: "Exponential decay score (0-1). Decay constant: 350m"
        tests: [not_null]
      - name: tram_score
        description: "Exponential decay score (0-1). Decay constant: 500m"
        tests: [not_null]
      - name: air_score
        description: "Exponential decay score (0-1). Decay constant: 5000m"
        tests: [not_null]
      - name: ferry_score
        description: "Exponential decay score (0-1). Decay constant: 500m"
        tests: [not_null]
      - name: transport_score
        description: "Weighted composite: rail 0.30 + bus 0.35 + tram 0.15 + air 0.10 + ferry 0.10"
        tests: [not_null]
      - name: _updated_at
        description: "Timestamp of last dbt build run"

  - name: dim_time
    description: >
      Date dimension covering 2000-01-01 to 2035-12-31 (~13,149 rows).
      Generated via dbt_utils.date_spine. date_key is YYYYMMDD integer.
      Portugal fiscal year = calendar year. ISO day-of-week (1=Mon, 7=Sun).
    columns:
      - name: date_key
        description: "YYYYMMDD integer key (e.g. 20240115)"
        tests:
          - unique
          - not_null
      - name: full_date
        description: "DATE value"
        tests:
          - unique
          - not_null
      - name: year
        description: "Calendar year (e.g. 2024)"
        tests:
          - not_null
      - name: quarter
        description: "Calendar quarter (1-4)"
        tests:
          - not_null
      - name: month
        description: "Month number (1-12)"
        tests:
          - not_null
      - name: month_name
        description: "Full month name (e.g. 'January')"
      - name: week_of_year
        description: "ISO week number (1-53)"
      - name: day_of_month
        description: "Day of month (1-31)"
      - name: day_of_week
        description: "ISO day of week: 1=Monday, 7=Sunday"
