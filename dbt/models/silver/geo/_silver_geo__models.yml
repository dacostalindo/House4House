version: 2

models:
  - name: census_demographics
    description: >
      BGRI Census 2021 aggregated from 203K subsections to ~3,049 freguesias.
      Population by age band, household size, dwelling vacancy/tenure,
      plus INE Census 2021 indicators: building condition, employment, education,
      foreign population, mean age, and commuting time.
      Joins to dim_geography via geo_key for human-readable names.
      Source: bronze_ine.raw_bgri (BGRI subsections) + stg_ine_indicators (12 Census 2021 codes).
    columns:
      # ── Identity ────────────────────────────────────────────────────────────
      - name: geo_key
        description: "FK to dim_geography.geo_key — NULL for ~135 BGRI codes not in CAOP (administrative boundary changes between Census 2021 and current CAOP)"
        tests:
          - unique:
              where: "geo_key IS NOT NULL"
          - not_null:
              severity: warn

      - name: freguesia_code
        description: "6-digit DTMNFR code from BGRI (dtmnfr21). Primary key for this table"
        tests:
          - unique
          - not_null

      # ── Geography (from dim_geography) ──────────────────────────────────────
      - name: distrito_code
        description: "2-digit distrito code from dim_geography (e.g. '01' for Aveiro). NULL when geo_key is NULL"

      - name: distrito_name
        description: "Distrito name from dim_geography (e.g. 'Aveiro'). NULL when geo_key is NULL"

      - name: concelho_code
        description: "4-digit concelho code from dim_geography (e.g. '0105'). NULL when geo_key is NULL"

      - name: concelho_name
        description: "Concelho/municipality name from dim_geography. NULL when geo_key is NULL"

      - name: freguesia_name
        description: "Freguesia/parish name from dim_geography. NULL when geo_key is NULL"

      # ── Population ──────────────────────────────────────────────────────────
      - name: total_population
        description: "Total resident population (SUM of n_individuos across subsections)"
        tests:
          - not_null

      - name: pop_0_14
        description: "Population aged 0-14 (children). SUM of n_individuos_0_14"

      - name: pop_15_24
        description: "Population aged 15-24 (young adults). SUM of n_individuos_15_24"

      - name: pop_25_64
        description: "Population aged 25-64 (working age). SUM of n_individuos_25_64"

      - name: pop_65_plus
        description: "Population aged 65+ (elderly). SUM of n_individuos_65_ou_mais"

      - name: median_age
        description: >
          Weighted average age using band midpoints (7, 19.5, 44.5, 77.5).
          Not a true median — approximation from 4 age bands. Named 'median_age'
          for consistency with dim_geography.
          Formula: (pop_0_14 × 7 + pop_15_24 × 19.5 + pop_25_64 × 44.5 + pop_65_plus × 77.5) / total_population

      - name: aging_index
        description: >
          Demographic aging index: (pop_65_plus / pop_0_14) × 100.
          Values >100 mean more elderly than children. NULL when pop_0_14 = 0.
          Portugal average ~182 (2021).

      # ── Households ──────────────────────────────────────────────────────────
      - name: total_households
        description: "Total private domestic households (agregados domésticos privados)"
        tests:
          - not_null

      - name: avg_household_size
        description: "Average persons per household: total_population / total_households, rounded to 1 decimal"

      - name: small_household_pct
        description: >
          Percentage of households with 1-2 persons.
          BGRI only provides 1-2 vs 3+ split (n_adp_1_ou_2_pessoas / n_agregados_domesticos_privados × 100).
          Named 'small_household_pct' since true single-person count is unavailable.

      # ── Dwellings ──────────────────────────────────────────────────────────
      - name: total_dwellings
        description: "Total dwellings (alojamentos) including all types"
        tests:
          - not_null

      - name: occupied_dwellings
        description: "Dwellings classified as usual residence (residência habitual)"

      - name: vacant_dwellings
        description: "Dwellings classified as vacant or secondary residence (vagos ou residência secundária)"

      - name: vacancy_rate
        description: >
          Percentage of dwellings that are vacant or secondary residence:
          vacant_dwellings / total_dwellings × 100.
          Portugal average ~42% (includes secondary residences, not just truly empty).

      - name: owner_occupied_pct
        description: >
          Percentage of usual-residence dwellings that are owner-occupied:
          n_rhabitual_prop_ocup / occupied_dwellings × 100.
          Portugal average ~82%.

      - name: renter_pct
        description: >
          Percentage of usual-residence dwellings that are rented:
          n_rhabitual_arrendados / occupied_dwellings × 100.
          Complement of owner_occupied_pct (plus 'other' category).

      # ── INE building condition indicators ───────────────────────────────────
      - name: building_aging_ratio
        description: >
          Building aging index from INE indicator 0012575 (Census 2021).
          Ratio of buildings >50 years old to buildings <20 years old.
          Higher values indicate older building stock. Joined via geographic_code = freguesia_code.
          Coverage: ~3,397 of 3,049 BGRI freguesias (some codes not in CAOP).

      - name: buildings_repair_needed_pct
        description: >
          Proportion of buildings needing repair (%) from INE indicator 0012581 (Census 2021).
          Includes buildings with small, medium, and large repairs needed.
          Joined via geographic_code = freguesia_code.
          Coverage: ~3,438 of 3,049 BGRI freguesias.

      # ── INE employment indicators (Census 2021) ───────────────────────────
      - name: unemployment_rate
        description: >
          Unemployment rate (%) from INE 0012328 (Census 2021, total).
          % of economically active population aged 15+ without employment.
          Joined via geographic_code = freguesia_code, filtered dim_3 = 'T' (total, both sexes).

      - name: activity_rate
        description: >
          Activity rate (%) from INE 0012317 (Census 2021, total).
          % of population aged 15+ that is economically active.
          Joined via geographic_code = freguesia_code, filtered dim_3 = 'T' (total, both sexes).

      - name: employees_pct
        description: >
          Proportion of employees (%) from INE 0012341 (Census 2021, total).
          % of employed population working as employees (vs self-employed).
          Joined via geographic_code = freguesia_code, filtered dim_3 = 'T' (total, both sexes).

      # ── INE education indicators (Census 2021) ────────────────────────────
      - name: higher_education_pct
        description: >
          Proportion of population with higher education (%) from INE 0012316
          (Census 2021, total).

      - name: lower_secondary_pct
        description: >
          Proportion of population with at least lower secondary education (%)
          from INE 0012315 (Census 2021, total).

      - name: upper_secondary_pct
        description: >
          Proportion of population with at least upper secondary education (%)
          from INE 0012327 (Census 2021, total).

      - name: no_education_pct
        description: >
          Proportion of population with no education (%) from INE 0012323
          (Census 2021, total).

      # ── INE foreign population (Census 2021) ──────────────────────────────
      - name: foreign_nationality_pct
        description: >
          Proportion of resident population with foreign nationality (%)
          from INE 0012314 (Census 2021, total).

      # ── INE age & commuting (Census 2021) ─────────────────────────────────
      - name: ine_mean_age
        description: >
          Mean age of resident population (years) from INE 0012374 (Census 2021).
          More precise than the BGRI-derived median_age which uses band midpoints.

      - name: avg_commuting_time_min
        description: >
          Average commuting time (minutes) from INE 0012331 (Census 2021).

      # ── Metadata ────────────────────────────────────────────────────────────
      - name: census_year
        description: "Census reference year, always 2021"
        tests:
          - not_null
          - accepted_values:
              values: ['2021']

      - name: _updated_at
        description: "Timestamp of last dbt build run (NOW())"

  - name: land_use
    description: >
      COS 2023 land-use/cover polygons enriched with 4-level hierarchy decomposition,
      category classification, boolean flags, and dominant freguesia assignment via
      spatial join to CAOP. ~784K MultiPolygons covering all mainland Portugal.
      Source: DGT COS 2023 (Series 2). CC-BY 4.0.
    columns:
      - name: land_use_key
        description: "Surrogate key (row number ordered by GPKG id)"
        tests: [unique, not_null]

      - name: id
        description: "Original feature ID from COS GPKG"

      - name: land_use_code
        description: "4-level hierarchical code (e.g. '1.1.1.1')"
        tests: [not_null]

      - name: land_use_label
        description: "Portuguese label for the land-use code"

      - name: area_ha
        description: "Polygon area in hectares from COS GPKG"

      - name: land_use_level1
        description: "Level 1 code (e.g. '1'). 1=Artificial, 2=Agriculture, 3=Pasture, 4=Forest, 5=Shrubland, 6=Sparse, 7=Wetland, 8=Water, 9=Ocean"

      - name: land_use_level2
        description: "Level 1+2 code (e.g. '1.1' = residential areas)"

      - name: land_use_level3
        description: "Level 1+2+3 code (e.g. '1.1.1' = continuous residential)"

      - name: land_use_category
        description: "English label for level 1: artificial, agriculture, pasture, forest, shrubland, sparse_vegetation, wetland, water, ocean"
        tests: [not_null]

      - name: is_urban
        description: "True if code starts with 1. (artificial/urban areas)"

      - name: is_residential
        description: "True if code starts with 1.1 (residential areas)"

      - name: is_agricultural
        description: "True if code starts with 2. (agriculture)"

      - name: is_forest
        description: "True if code starts with 4. (forest)"

      - name: freguesia_code
        description: "6-digit DTMNFR code of the dominant freguesia (largest spatial overlap with CAOP). NULL for polygons outside mainland CAOP coverage."

      - name: concelho_code
        description: "4-digit concelho code derived from dominant freguesia"

      - name: distrito_code
        description: "2-digit distrito code derived from dominant freguesia"

      - name: geom
        description: "MultiPolygon in EPSG:3763 (PT-TM06/ETRS89)"
        tests: [not_null]

      - name: geom_wgs84
        description: "MultiPolygon in EPSG:4326 (WGS84) for spatial joins with listings"

      - name: _updated_at
        description: "Timestamp of last dbt build run (NOW())"

  - name: aquifers
    description: >
      LNEG Sistemas Aquíferos — national aquifer-system polygons (~63 rows,
      e.g. O1 Quaternário de Aveiro, O2 Cretácico de Aveiro). Contextual layer
      — fn_assess_polygon exposes aquifer_name + aquifer_age in its JSONB
      readout but does NOT treat aquifer presence as a regulatory constraint
      (DL 382/99 captação protection zones are a separate, narrower layer).
      No derived aquifer_vulnerability in v1 (DRASTIC inputs missing in bronze).
      See [[lneg]] + [[silver-dq-baseline]].
    columns:
      - name: aquifer_key
        description: "Surrogate key — ROW_NUMBER OVER (ORDER BY codigo_inag, feature_id)"
        tests: [unique, not_null]
      - name: feature_id
      - name: codigo_inag
        description: "INAG aquifer code (e.g. 'O1', 'O2') — natural key"
        tests: [not_null]
      - name: aquifer_name
      - name: aquifer_system
      - name: aquifer_age
      - name: hydrogeo_unit_id
      - name: geom
        description: "MultiPolygon in EPSG:4326. SRID + ST_IsValid via pgTAP."
        tests: [not_null]
      - name: geom_pt
        description: "MultiPolygon in EPSG:3763. SRID via pgTAP."
        tests: [not_null]
      - name: _loaded_at
      - name: _updated_at

  - name: geology
    description: >
      LNEG CGP500k national geology polygons (~282 rows). Contextual layer —
      fn_assess_polygon exposes lithology_code + lithology_description + era +
      geological_period in its JSONB readout but does NOT treat geology as a
      hard constraint. v1 exposes raw bronze fields only; foundation_difficulty
      deferred to v2 per locked decisions 14+17 (1:500k too coarse for
      Eurocode 7 Geotechnical Categories; era is not the actual difficulty
      signal — formation-specific clay mineralogy is, per Galhano & Rocha for
      the Aveiro counterexample).
      See [[lneg]] + [[silver-dq-baseline]].
    columns:
      - name: geology_key
        description: "Surrogate key — ROW_NUMBER OVER (ORDER BY feature_id)"
        tests: [unique, not_null]
      - name: feature_id
      - name: lithology_code
        description: "From bronze JSONB Código (e.g. 'gama', 'PEU', 'a', 'J3A'). Heterogeneous; no meaningful single-char prefix — use `era` for grouping."
        tests: [not_null]
      - name: lithology_description
        description: "From bronze JSONB Descrição — rich PT-language label (e.g. 'Aluviões')"
      - name: lithology_description_extra
        description: "From bronze JSONB Descrição1 — secondary classification"
      - name: eon
        description: "From bronze JSONB Eonotema"
      - name: era
        description: "From bronze JSONB Eratema (e.g. 'Cenozóico', 'Mesozóico', 'Paleozóico', 'Pré-câmbrico') — the proper era grouping field"
      - name: geological_period
        description: "From bronze JSONB Sistema (e.g. 'Quaternário', 'Cretácico', 'Jurássico')"
      - name: epoch
        description: "From bronze JSONB Série (e.g. 'Holocénico')"
      - name: chrono_zone
        description: "From bronze JSONB Zona — broader chrono-structural grouping (e.g. 'Cobertura Cenozóica'). Not strictly chronostratigraphic per the International Chronostratigraphic Chart hierarchy."
      - name: plutonic_intrusions
        description: "From bronze JSONB Intrusões_plutónicas"
      - name: geom
        description: "MultiPolygon in EPSG:4326. SRID + ST_IsValid via pgTAP."
        tests: [not_null]
      - name: geom_pt
        description: "MultiPolygon in EPSG:3763. SRID via pgTAP."
        tests: [not_null]
      - name: _loaded_at
      - name: _updated_at

  - name: floodplains
    description: >
      APA ARPSI floodplain polygons (~188 national, ~18 in Aveiro município)
      from the EU Floods Directive scope (DL 115/2010). 15th constraint layer
      alongside the 14 stg_srup_* siblings — fn_assess_polygon spatial-joins
      this directly and reads the denormalized severity column.
      T100 (1% annual) = severity 3 hard gate; T1000 (0.1% annual) = severity 2
      conditioned. Coverage caveat: ARPSI is EU-priority flood polygons only,
      NOT all flood-prone areas in PT. See [[apa]] + [[silver-dq-baseline]].
    columns:
      - name: floodplain_id
        description: "Surrogate key — ROW_NUMBER OVER (ORDER BY feature_id)"
        tests: [unique, not_null]
      - name: feature_id
        description: "Bronze ArcGIS OBJECTID"
        tests: [not_null]
      - name: constraint_code
        description: "Constant 'ARPSI_Floodplain' — FK into dim_constraint_severity"
        tests: [not_null]
      - name: zone_type
        description: "'T100' or 'T1000' — second half of the dim_constraint_severity compound key"
        tests: [not_null]
      - name: return_period_years
        description: "100 or 1000 (bronze pass-through)"
        tests: [not_null]
      - name: hydrographic_region
        description: "RHidro from bronze (e.g. 'PTRH4A' Vouga sub-basin)"
      - name: location
        description: "Local field from bronze"
      - name: designation
        description: "Designa field from bronze"
      - name: publication_date
        description: "Data field from bronze, cast to DATE"
      - name: severity
        description: >
          Denormalized from dim_constraint_severity. 3 (hard gate) for T100,
          2 (conditioned) for T1000. NOT NULL test catches FK miss after the
          LEFT JOIN (silver-dq-baseline Rule 4).
        tests: [not_null]
      - name: buffer_m
        description: "Denormalized from dim_constraint_severity. Always 0 — the polygon IS the legal flood envelope"
        tests: [not_null]
      - name: geom
        description: "MultiPolygon in EPSG:4326 (per [[2026-05-10-dual-crs-storage]] canonical). SRID + ST_IsValid via pgTAP."
        tests: [not_null]
      - name: geom_pt
        description: "MultiPolygon in EPSG:3763 (PT-TM06). SRID via pgTAP."
        tests: [not_null]
      - name: _loaded_at
        description: "Bronze load timestamp"
      - name: _updated_at
        description: "Timestamp of last dbt build run (NOW())"

  - name: zoning
    description: >
      PDM land-use zoning polygons from CRUS (Carta do Regime de Uso do Solo),
      the nationally standardized land-use classification published by DGTERRITÓRIO.
      Covers Aveiro, Lisboa, Porto, Coimbra, Leiria (5,472 polygons).
      Each polygon represents a land-use zone with classification (Solo Urbano/Rústico),
      category, and a simplified zone_category for the hedonic pricing model.
      Use ST_Within(listing.geom_pt, zoning.geom) for spatial joins.
    columns:
      - name: zone_key
        description: "Surrogate key (row number ordered by municipality_code, feature_id)"
        tests:
          - unique
          - not_null

      - name: municipality_code
        description: "4-digit DTCC municipality code (e.g. 0105 = Aveiro, 1106 = Lisboa)"
        tests:
          - not_null

      - name: municipality_name
        description: "Municipality name (e.g. AVEIRO, LISBOA)"

      - name: land_classification
        description: >
          PDM land classification surfaced by the OGC API. Three core values
          plus four data-quality variants the OGC API exposes (the legacy WFS
          path only emitted the three core values).

          Core: 'Solo Urbano', 'Solo Rústico', 'Espaços não classificados'.
          Variants from OGC: 'Solo Urbano (urbanizável – transitório)' (rolling
          urban-expansion zones), 'Não Atribuída' (unassigned during PDM revision),
          'Discrepância' (analog↔digital cadastre mismatch flagged by DGT).

          Note: the OGC source includes capitalization variants of
          'Espaços não classificados' ('Espaços não Classificados',
          'Espaços Não Classificados') from inconsistent municipal data entry —
          all three forms are accepted here verbatim. Normalization (e.g. via
          a `lower(unaccent(...))` projection in the staging model) is a v1.5
          cleanup option if this becomes load-bearing for the Inspector.
        tests:
          - not_null
          - accepted_values:
              values:
                - 'Solo Urbano'
                - 'Solo Rústico'
                - 'Espaços não classificados'
                - 'Solo Urbano (urbanizável – transitório)'
                - 'Não Atribuída'
                - 'Discrepância'
                - 'Espaços não Classificados'
                - 'Espaços Não Classificados'

      - name: land_category
        description: >
          Detailed land-use category from PDM (e.g. Espaço Urbanizado, Espaço Agrícola,
          Espaço Florestal, Aglomerado Rural). Used to derive zone_category.

      - name: land_designation
        description: "Full designation text from the PDM planning map (Planta de Ordenamento)"

      - name: zone_category
        description: >
          Simplified zoning category for the hedonic pricing model, derived from
          land_classification + land_category. Values: urban_consolidated,
          urban_expansion, urban_residential, urban_central, urban_economic,
          urban_green, urban_special, urban_other, rural_agricultural,
          rural_settlement, rural_forest, rural_natural, rural_tourism,
          rural_special, rural_other, other.
        tests:
          - not_null

      # Density columns (max_floors / max_density_index / max_coverage_ratio)
      # were planned in Sprint-08 Activity 5 but deferred to sprint-09 after
      # verification 2026-05-13 showed the CRUS OGC `land_designation` field
      # doesn't carry density numbers (it's a hierarchical zone-name like
      # "Solo Urbano - Espaços Habitacionais - Espaço Habitacional Tipo 1").
      # The density rules live in the PDM Regulamento per município.

      - name: area_ha
        description: "Polygon area in hectares as reported by CRUS"

      - name: geom
        description: "Polygon geometry in EPSG:3763 (PT-TM06/ETRS89)"
        tests:
          - not_null

      - name: geom_wgs84
        description: "Polygon geometry in EPSG:4326 (WGS84) for spatial joins with listings"

      - name: pdm_publication_date
        description: "Publication date of the municipality's active PDM"

      - name: _updated_at
        description: "Timestamp of last dbt build run (NOW())"

  - name: terrain_slope_raster
    description: >
      Thin view over the 489-tile postgis_raster registry holding DGT 2m
      slope rasters (derived from MDT-2m via gdaldem Horn). Sprint-09 WS4
      PR A (2026-06-03). Replaces the previous parcel-proxy approach
      (`parcel_terrain_stats`, dropped) with on-the-fly ST_Clip queries that
      return exact stats for any drawn polygon.

      Consumed by gold.fn_assess_polygon (sprint-09 keystone) via the pattern:
        ST_SummaryStatsAgg(ST_Clip(r.rast, $drawn_polygon, TRUE), 1, TRUE)
      pre-filtered by ST_Intersects(footprint_pt, $drawn_polygon).

      See [[lidar]] + [[silver-dq-baseline]].
    columns:
      - name: rid
        description: "Surrogate PK from bronze (raster2pgsql/INSERT assignment)"
        tests: [unique, not_null]
      - name: rast
        description: "PostGIS raster (Float32 single-band slope in degrees, EPSG:3763, ~700×700 pixels per tile, ~1 MB compressed)"
        tests: [not_null]
      - name: filename
        description: "Source slope COG filename (e.g. 'MDT-2m-163417-04-2024_slope.tif'). Embeds source MDT tile_id for traceability."
        tests: [not_null, unique]
      - name: footprint_pt
        description: "ST_ConvexHull(rast) in EPSG:3763. GIST-indexed — used for fast pre-filter in fn_assess_polygon before the expensive ST_Clip."
        tests: [not_null]
      - name: footprint
        description: "Same as footprint_pt but transformed to EPSG:4326 for display in web maps."
      - name: _loaded_at
        description: "Bronze raster row's load timestamp (pass-through)"
      - name: _updated_at
        description: "Timestamp of last dbt build run (NOW())"
