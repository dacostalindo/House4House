version: 2

models:
  - name: census_demographics
    description: >
      BGRI Census 2021 aggregated from 203K subsections to ~3,049 freguesias.
      Population by age band, household size, dwelling vacancy/tenure,
      plus INE Census 2021 indicators: building condition, employment, education,
      foreign population, mean age, and commuting time.
      Joins to dim_geography via geo_key for human-readable names.
      Source: bronze_ine.raw_bgri (BGRI subsections) + stg_ine_indicators (12 Census 2021 codes).
    columns:
      # ── Identity ────────────────────────────────────────────────────────────
      - name: geo_key
        description: "FK to dim_geography.geo_key — NULL for ~135 BGRI codes not in CAOP (administrative boundary changes between Census 2021 and current CAOP)"
        tests:
          - unique:
              where: "geo_key IS NOT NULL"
          - not_null:
              severity: warn

      - name: freguesia_code
        description: "6-digit DTMNFR code from BGRI (dtmnfr21). Primary key for this table"
        tests:
          - unique
          - not_null

      # ── Geography (from dim_geography) ──────────────────────────────────────
      - name: distrito_code
        description: "2-digit distrito code from dim_geography (e.g. '01' for Aveiro). NULL when geo_key is NULL"

      - name: distrito_name
        description: "Distrito name from dim_geography (e.g. 'Aveiro'). NULL when geo_key is NULL"

      - name: concelho_code
        description: "4-digit concelho code from dim_geography (e.g. '0105'). NULL when geo_key is NULL"

      - name: concelho_name
        description: "Concelho/municipality name from dim_geography. NULL when geo_key is NULL"

      - name: freguesia_name
        description: "Freguesia/parish name from dim_geography. NULL when geo_key is NULL"

      # ── Population ──────────────────────────────────────────────────────────
      - name: total_population
        description: "Total resident population (SUM of n_individuos across subsections)"
        tests:
          - not_null

      - name: pop_0_14
        description: "Population aged 0-14 (children). SUM of n_individuos_0_14"

      - name: pop_15_24
        description: "Population aged 15-24 (young adults). SUM of n_individuos_15_24"

      - name: pop_25_64
        description: "Population aged 25-64 (working age). SUM of n_individuos_25_64"

      - name: pop_65_plus
        description: "Population aged 65+ (elderly). SUM of n_individuos_65_ou_mais"

      - name: median_age
        description: >
          Weighted average age using band midpoints (7, 19.5, 44.5, 77.5).
          Not a true median — approximation from 4 age bands. Named 'median_age'
          for consistency with dim_geography.
          Formula: (pop_0_14 × 7 + pop_15_24 × 19.5 + pop_25_64 × 44.5 + pop_65_plus × 77.5) / total_population

      - name: aging_index
        description: >
          Demographic aging index: (pop_65_plus / pop_0_14) × 100.
          Values >100 mean more elderly than children. NULL when pop_0_14 = 0.
          Portugal average ~182 (2021).

      # ── Households ──────────────────────────────────────────────────────────
      - name: total_households
        description: "Total private domestic households (agregados domésticos privados)"
        tests:
          - not_null

      - name: avg_household_size
        description: "Average persons per household: total_population / total_households, rounded to 1 decimal"

      - name: small_household_pct
        description: >
          Percentage of households with 1-2 persons.
          BGRI only provides 1-2 vs 3+ split (n_adp_1_ou_2_pessoas / n_agregados_domesticos_privados × 100).
          Named 'small_household_pct' since true single-person count is unavailable.

      # ── Dwellings ──────────────────────────────────────────────────────────
      - name: total_dwellings
        description: "Total dwellings (alojamentos) including all types"
        tests:
          - not_null

      - name: occupied_dwellings
        description: "Dwellings classified as usual residence (residência habitual)"

      - name: vacant_dwellings
        description: "Dwellings classified as vacant or secondary residence (vagos ou residência secundária)"

      - name: vacancy_rate
        description: >
          Percentage of dwellings that are vacant or secondary residence:
          vacant_dwellings / total_dwellings × 100.
          Portugal average ~42% (includes secondary residences, not just truly empty).

      - name: owner_occupied_pct
        description: >
          Percentage of usual-residence dwellings that are owner-occupied:
          n_rhabitual_prop_ocup / occupied_dwellings × 100.
          Portugal average ~82%.

      - name: renter_pct
        description: >
          Percentage of usual-residence dwellings that are rented:
          n_rhabitual_arrendados / occupied_dwellings × 100.
          Complement of owner_occupied_pct (plus 'other' category).

      # ── INE building condition indicators ───────────────────────────────────
      - name: building_aging_ratio
        description: >
          Building aging index from INE indicator 0012575 (Census 2021).
          Ratio of buildings >50 years old to buildings <20 years old.
          Higher values indicate older building stock. Joined via geographic_code = freguesia_code.
          Coverage: ~3,397 of 3,049 BGRI freguesias (some codes not in CAOP).

      - name: buildings_repair_needed_pct
        description: >
          Proportion of buildings needing repair (%) from INE indicator 0012581 (Census 2021).
          Includes buildings with small, medium, and large repairs needed.
          Joined via geographic_code = freguesia_code.
          Coverage: ~3,438 of 3,049 BGRI freguesias.

      # ── INE employment indicators (Census 2021) ───────────────────────────
      - name: unemployment_rate
        description: >
          Unemployment rate (%) from INE 0012328 (Census 2021, total).
          % of economically active population aged 15+ without employment.
          Joined via geographic_code = freguesia_code, filtered dim_3 = 'T' (total, both sexes).

      - name: activity_rate
        description: >
          Activity rate (%) from INE 0012317 (Census 2021, total).
          % of population aged 15+ that is economically active.
          Joined via geographic_code = freguesia_code, filtered dim_3 = 'T' (total, both sexes).

      - name: employees_pct
        description: >
          Proportion of employees (%) from INE 0012341 (Census 2021, total).
          % of employed population working as employees (vs self-employed).
          Joined via geographic_code = freguesia_code, filtered dim_3 = 'T' (total, both sexes).

      # ── INE education indicators (Census 2021) ────────────────────────────
      - name: higher_education_pct
        description: >
          Proportion of population with higher education (%) from INE 0012316
          (Census 2021, total).

      - name: lower_secondary_pct
        description: >
          Proportion of population with at least lower secondary education (%)
          from INE 0012315 (Census 2021, total).

      - name: upper_secondary_pct
        description: >
          Proportion of population with at least upper secondary education (%)
          from INE 0012327 (Census 2021, total).

      - name: no_education_pct
        description: >
          Proportion of population with no education (%) from INE 0012323
          (Census 2021, total).

      # ── INE foreign population (Census 2021) ──────────────────────────────
      - name: foreign_nationality_pct
        description: >
          Proportion of resident population with foreign nationality (%)
          from INE 0012314 (Census 2021, total).

      # ── INE age & commuting (Census 2021) ─────────────────────────────────
      - name: ine_mean_age
        description: >
          Mean age of resident population (years) from INE 0012374 (Census 2021).
          More precise than the BGRI-derived median_age which uses band midpoints.

      - name: avg_commuting_time_min
        description: >
          Average commuting time (minutes) from INE 0012331 (Census 2021).

      # ── Metadata ────────────────────────────────────────────────────────────
      - name: census_year
        description: "Census reference year, always 2021"
        tests:
          - not_null
          - accepted_values:
              values: ['2021']

      - name: _updated_at
        description: "Timestamp of last dbt build run (NOW())"

  - name: zoning
    description: >
      PDM land-use zoning polygons from CRUS (Carta do Regime de Uso do Solo),
      the nationally standardized land-use classification published by DGTERRITÓRIO.
      Covers Aveiro, Lisboa, Porto, Coimbra, Leiria (5,472 polygons).
      Each polygon represents a land-use zone with classification (Solo Urbano/Rústico),
      category, and a simplified zone_category for the hedonic pricing model.
      Use ST_Within(listing.geom_pt, zoning.geom) for spatial joins.
    columns:
      - name: zone_key
        description: "Surrogate key (row number ordered by municipality_code, feature_id)"
        tests:
          - unique
          - not_null

      - name: municipality_code
        description: "4-digit DTCC municipality code (e.g. 0105 = Aveiro, 1106 = Lisboa)"
        tests:
          - not_null

      - name: municipality_name
        description: "Municipality name (e.g. AVEIRO, LISBOA)"

      - name: land_classification
        description: "PDM land classification: 'Solo Urbano', 'Solo Rústico', or 'Espaços não classificados'"
        tests:
          - not_null
          - accepted_values:
              values: ['Solo Urbano', 'Solo Rústico', 'Espaços não classificados']

      - name: land_category
        description: >
          Detailed land-use category from PDM (e.g. Espaço Urbanizado, Espaço Agrícola,
          Espaço Florestal, Aglomerado Rural). Used to derive zone_category.

      - name: land_designation
        description: "Full designation text from the PDM planning map (Planta de Ordenamento)"

      - name: zone_category
        description: >
          Simplified zoning category for the hedonic pricing model, derived from
          land_classification + land_category. Values: urban_consolidated,
          urban_expansion, urban_residential, urban_central, urban_economic,
          urban_green, urban_special, urban_other, rural_agricultural,
          rural_settlement, rural_forest, rural_natural, rural_tourism,
          rural_special, rural_other, other.
        tests:
          - not_null

      - name: area_ha
        description: "Polygon area in hectares as reported by CRUS"

      - name: geom
        description: "Polygon geometry in EPSG:3763 (PT-TM06/ETRS89)"
        tests:
          - not_null

      - name: geom_wgs84
        description: "Polygon geometry in EPSG:4326 (WGS84) for spatial joins with listings"

      - name: pdm_publication_date
        description: "Publication date of the municipality's active PDM"

      - name: _updated_at
        description: "Timestamp of last dbt build run (NOW())"
