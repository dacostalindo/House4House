version: 2

models:
  - name: silver_sce_buildings
    description: >
      Per-building SCE roll-up. One row = one physical building, produced
      by clustering geocoded SCE certificates (stg_sce_certificates) via
      ST_ClusterDBSCAN (eps=30m, minpoints=1) and grouping within each
      cluster by normalized_address. v1 input filtered to
      geocode_source='nominatim' (freguesia-centroid rows are bulk-
      imprecise and would collapse a whole parish into one cluster).
      No parcel_id: empirically 97.7% of Nominatim-geocoded SCE points
      fall on street centerlines outside cadastral parcels (typical
      50-200m gap). Atlas Inspector joins parcel_universe at query time
      when it needs per-parcel context. Consumed by sprint-09's
      gold.fn_assess_polygon via ST_DWithin for the "nearby SCE
      developments" Atlas Inspector surface.
    columns:
      # ── Identity ───────────────────────────────────────────────────────
      - name: sce_building_id
        description: "Surrogate BIGINT key produced by ROW_NUMBER over (cluster_id, normalized_address). Stable within a build, not across rebuilds (cluster_id is DBSCAN row-order-dependent)."
        tests:
          - unique
          - not_null
      # ── Geometry (dual CRS, both GIST-indexed) ────────────────────────
      - name: cluster_geom_3763
        description: "Centroid of the cluster in EPSG:3763 (PT-TM06). Computed as ST_Centroid over member geom_3763. Used for ST_DWithin spatial joins in fn_assess_polygon"
        tests:
          - not_null
      - name: cluster_geom_4326
        description: "Same centroid in EPSG:4326 (WGS84). For Kepler.gl / Leaflet display in the Inspector"
        tests:
          - not_null
      # ── Administrative ────────────────────────────────────────────────
      - name: concelho
        description: "Mode of member SCE rows' municipality (after upper-cased + trimmed). NULL if no member rows or empty mode"
      - name: parish
        description: "Mode of member SCE rows' parish (freguesia_detail). NULL when not all members agree"
      # ── Aggregates ────────────────────────────────────────────────────
      - name: frac_count
        description: "Number of distinct frações (physical units) in the building. A fração re-certified over time holds several SCE certificates but counts once; unlabelled certs fall back to doc_number so distinct unlabelled units are not merged. Test #9 enforces frac_count = distinct frações."
        tests:
          - not_null
      - name: energy_class_dist
        description: >
          JSONB histogram across the 7 PT energy classes (A+, A, B, B-, C, D, E, F).
          Shape: {"A+": N, "A": N, ..., "F": N}, counting each fração once via its
          latest certificate. Frações with missing/unparseable energy_class are
          dropped (don't inflate any bucket). Sprint-09 Slice B Test #10 enforces
          sum(values) == frac_count for frações with a non-null energy class.
      - name: first_emission
        description: "MIN(member issued_date). Earliest SCE certificate observed for this building. Proxy for build year"
      - name: last_emission
        description: "MAX(member issued_date). Latest SCE certificate observed. last_emission - first_emission ≈ unit-issuance window"
      - name: dominant_state
        description: "Mode of member status (e.g. 'Válido', 'Revogado'). Tie → alphabetical first. NULL when all members null"
      - name: cluster_geocode_confidence
        description: "MIN of member geocode_confidence. Surfaces fuzzy clusters to the UI: a building containing one freguesia-centroid-only member drags the whole building's confidence to 0.2"
        tests:
          - not_null
      # ── Provenance ────────────────────────────────────────────────────
      - name: member_doc_numbers
        description: "TEXT[] array of constituent SCE doc_numbers. For tracing 'which certificate fed this building' from the Inspector"
        tests:
          - not_null
      - name: _built_at
        description: "Timestamp the table was built (NOW() at SELECT time)"
        tests:
          - not_null

  - name: silver_unified_developments
    description: >
      One row per marketed real-estate development, de-duplicated across the 4
      listing portals (idealista, RE/MAX, Zome, JLL). Sprint-09 Slice B-prime.

      Portal dedup is name-driven: project names are normalized (deaccent;
      strip typology codes T1/T2/T1+1, boilerplate words empreendimento/edifício/
      the, and a trailing concelho name; punctuation → space), tokenized, and two
      listings are linked when their word-sets have Jaccard overlap >= 0.6 AND
      they share a concelho. A 1km distance ceiling is a guardrail (skipped when
      a coord is missing). Connected components over those links produce one
      development per component. Proximity-first (DBSCAN) was rejected: portal
      coordinates disagree by 200-300m+ for the same development.

      Geometry hierarchy: the development takes geom + concelho + parish from the
      highest-priority portal present that has coordinates: JLL > Zome > RE/MAX
      > idealista. geo_key resolved by point-in-polygon of the unified geom
      against dim_geography.freguesia_geom_pt.

      SCE is intentionally NOT merged here. SCE buildings (certified physical
      buildings) and portal developments (marketed projects) are different
      concepts with no shared identifier and incompatible geocoding precision.
      Atlas Inspector / fn_assess_polygon query silver_unified_developments AND
      silver_sce_buildings side-by-side ("marketed developments here + certified
      buildings here") rather than forcing them into one row.

      portal_unit_counts (JSONB) exposes every portal's reported count without
      picking an "authoritative" one — each portal's count has different semantics
      (idealista = listed-units subset per the 2026-05-22 facade audit; Zome =
      inventory; JLL = total fractions; RE/MAX = listings at RE/MAX). Consumers
      read the breakdown and choose.
    columns:
      # ── Identity ───────────────────────────────────────────────────────
      - name: unified_development_id
        description: "Surrogate BIGINT key produced by ROW_NUMBER over the result. Stable within a build, NOT across rebuilds. The stable identity of a development is the content of portal_refs."
        tests:
          - unique
          - not_null
      # ── Geometry (dual CRS, both GIST-indexed) ────────────────────────
      - name: unified_geom_3763
        description: "Development centroid in EPSG:3763 (PT-TM06). Taken from the highest-priority portal with coordinates (JLL > Zome > RE/MAX > idealista) — ST_Centroid over that portal's member geoms."
        tests:
          - not_null
      - name: unified_geom_4326
        description: "Same centroid in EPSG:4326 (WGS84). For Kepler.gl / Leaflet display in the Inspector."
        tests:
          - not_null
      # ── Administrative ────────────────────────────────────────────────
      - name: geo_key
        description: "FK to dim_geography (the freguesia containing unified_geom_3763). NULL when the point falls outside every current freguesia polygon (~1% of rows — typically offshore/boundary edge cases)."
      - name: concelho
        description: "Concelho name — COALESCE(dim_geography.concelho_name resolved via point-in-polygon, portal text MODE)."
      - name: parish
        description: "Freguesia name — COALESCE(dim_geography.freguesia_name resolved via point-in-polygon, portal text MODE)."
      - name: dominant_name
        description: "Most common canonical_name across the development's portal members (MODE over non-null names). NULL only if every contributing portal listed the dev without a name."
      # ── Counts + provenance ──────────────────────────────────────────
      - name: portal_unit_counts
        description: "JSONB {portal: unit_count} — each portal's reported total_units. No authoritative pick: idealista = listed-units subset, Zome = inventory, JLL = total_fractions, RE/MAX = listings at RE/MAX. Consumer reads the breakdown."
        tests:
          - not_null
      - name: n_portal_contributors
        description: "Number of distinct portals that contributed to this development (1-4)."
        tests:
          - not_null
      - name: portal_refs
        description: "JSONB {portal: [portal_dev_id, ...]} — every contributing portal record. The stable identity of the development; the surrogate id is not."
        tests:
          - not_null
      - name: _built_at
        description: "Timestamp the table was built (NOW() at SELECT time)."
        tests:
          - not_null
