version: 2

models:
  - name: silver_sce_buildings
    description: >
      Per-building SCE roll-up. One row = one physical building, produced
      by clustering geocoded SCE certificates (stg_sce_certificates) via
      ST_ClusterDBSCAN (eps=30m, minpoints=1) and grouping within each
      cluster by normalized_address. v1 input filtered to
      geocode_source='nominatim' (freguesia-centroid rows are bulk-
      imprecise and would collapse a whole parish into one cluster).
      No parcel_id: empirically 97.7% of Nominatim-geocoded SCE points
      fall on street centerlines outside cadastral parcels (typical
      50-200m gap). Atlas Inspector joins parcel_universe at query time
      when it needs per-parcel context. Consumed by sprint-09's
      gold.fn_assess_polygon via ST_DWithin for the "nearby SCE
      developments" Atlas Inspector surface.
    columns:
      # ── Identity ───────────────────────────────────────────────────────
      - name: sce_building_id
        description: "Surrogate BIGINT key produced by ROW_NUMBER over (cluster_id, normalized_address). Stable within a build, not across rebuilds (cluster_id is DBSCAN row-order-dependent)."
        tests:
          - unique
          - not_null
      # ── Geometry (dual CRS, both GIST-indexed) ────────────────────────
      - name: cluster_geom_3763
        description: "Centroid of the cluster in EPSG:3763 (PT-TM06). Computed as ST_Centroid over member geom_3763. Used for ST_DWithin spatial joins in fn_assess_polygon"
        tests:
          - not_null
      - name: cluster_geom_4326
        description: "Same centroid in EPSG:4326 (WGS84). For Kepler.gl / Leaflet display in the Inspector"
        tests:
          - not_null
      # ── Administrative ────────────────────────────────────────────────
      - name: concelho
        description: "Mode of member SCE rows' municipality (after upper-cased + trimmed). NULL if no member rows or empty mode"
      - name: parish
        description: "Mode of member SCE rows' parish (freguesia_detail). NULL when not all members agree"
      # ── Aggregates ────────────────────────────────────────────────────
      - name: frac_count
        description: "Count of member SCE rows ≈ number of units (fracções) in the building. Sprint-09 Slice B Test #9 enforces SUM(frac_count) = COUNT(stg_sce_certificates WHERE geocode_source='nominatim')"
        tests:
          - not_null
      - name: energy_class_dist
        description: >
          JSONB histogram across the 7 PT energy classes (A+, A, B, B-, C, D, E, F).
          Shape: {"A+": N, "A": N, ..., "F": N}. Members with missing/unparseable
          energy_class are dropped (don't inflate any bucket). Sprint-09 Slice B
          Test #10 enforces sum(values) == frac_count for non-null-energy members
      - name: first_emission
        description: "MIN(member issued_date). Earliest SCE certificate observed for this building. Proxy for build year"
      - name: last_emission
        description: "MAX(member issued_date). Latest SCE certificate observed. last_emission - first_emission ≈ unit-issuance window"
      - name: dominant_state
        description: "Mode of member status (e.g. 'Válido', 'Revogado'). Tie → alphabetical first. NULL when all members null"
      - name: cluster_geocode_confidence
        description: "MIN of member geocode_confidence. Surfaces fuzzy clusters to the UI: a building containing one freguesia-centroid-only member drags the whole building's confidence to 0.2"
        tests:
          - not_null
      # ── Provenance ────────────────────────────────────────────────────
      - name: member_doc_numbers
        description: "TEXT[] array of constituent SCE doc_numbers. For tracing 'which certificate fed this building' from the Inspector"
        tests:
          - not_null
      - name: _built_at
        description: "Timestamp the table was built (NOW() at SELECT time)"
        tests:
          - not_null
