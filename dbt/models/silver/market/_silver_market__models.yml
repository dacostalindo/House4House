version: 2

models:
  - name: macro_timeseries
    description: >
      Unified macro-economic time series from three sources: BPStat (Banco de Portugal),
      ECB (European Central Bank), and Eurostat (EU statistics).
      Periods parsed to DATE. Change rates (MoM, QoQ, YoY) computed via LAG window functions
      partitioned by (indicator_code, geo).
      Sources: stg_bpstat, stg_ecb, stg_eurostat (all staging from bronze API ingestion).
    columns:
      # ── Identity ────────────────────────────────────────────────────────────
      - name: id
        description: "Surrogate key via ROW_NUMBER ordered by (source, indicator_code, geo, observation_date)"
        tests: [unique, not_null]

      - name: indicator_code
        description: >
          Unique indicator identifier. Format varies by source:
          BPStat: 'BPSTAT_' + series_id (e.g. BPSTAT_12345),
          ECB: raw series_key (e.g. MIR.M.PT.B.A2A.A.R.A.2250.EUR.N),
          Eurostat: 'EUROSTAT_' + dataset_code + '_' + purchase + '_' + unit
        tests: [not_null]

      - name: indicator_name
        description: >
          Human-readable indicator name.
          BPStat: series_name from API, ECB: series_name from API,
          Eurostat: constructed from dataset_code + purchase + unit description.
          Used for display in dashboards and reports.

      # ── Classification ──────────────────────────────────────────────────────
      - name: category
        description: >
          Thematic grouping: 'housing_credit' (BPStat domain 186 — mortgage volumes, new loans),
          'interest_rates' (BPStat domain 21 + ECB — Euribor, ECB rates, PT mortgage rates),
          'housing_prices' (BPStat domain 39 + Eurostat — HPI indices, price changes)
        tests:
          - not_null
          - accepted_values:
              values: ['housing_credit', 'interest_rates', 'housing_prices']

      - name: source
        description: "'bpstat' (Banco de Portugal), 'ecb' (European Central Bank), or 'eurostat' (EU statistics)"
        tests:
          - not_null
          - accepted_values:
              values: ['bpstat', 'ecb', 'eurostat']

      - name: geo
        description: >
          Geographic scope. 'PT' for Portuguese national data (BPStat),
          'EU' for euro area aggregates (ECB),
          ISO country codes for Eurostat (PT, ES, FR, DE, etc.)
        tests: [not_null]

      # ── Time ────────────────────────────────────────────────────────────────
      - name: observation_date
        description: >
          Observation period normalized to first day of period.
          BPStat: end-of-month dates truncated to start-of-month via DATE_TRUNC.
          ECB: '2024-01' → 2024-01-01, '2024-Q1' → 2024-01-01.
          Eurostat: same quarter/month parsing as ECB.
        tests: [not_null]

      - name: period_type
        description: "'M' (monthly), 'Q' (quarterly), or 'A' (annual) — determines LAG offsets for change rates"

      # ── Values ──────────────────────────────────────────────────────────────
      - name: value
        description: >
          Observed numeric value. Units vary by indicator:
          interest rates (% per annum), price indices (base year = 100),
          change rates (%), loan volumes (EUR millions), etc.
          See 'unit' column for interpretation.
        tests: [not_null]

      - name: unit
        description: >
          Unit of measurement, translated from source codes.
          BPStat: 'Discount rate', 'Year-end rate', '4-quarter moving avg change rate'.
          ECB: 'Percentage per annum'.
          Eurostat: 'Index (2010=100)', 'Index (2015=100)', 'Annual rate of change (%)', 'Quarterly rate of change (%)'.

      # ── Computed change rates ───────────────────────────────────────────────
      - name: mom_change
        description: >
          Month-on-month % change: (value - lag(1)) / |lag(1)| × 100, rounded to 4 decimals.
          Only computed for monthly series (period_type = 'M'). NULL for quarterly/annual.
          Window: PARTITION BY indicator_code, geo ORDER BY observation_date.

      - name: qoq_change
        description: >
          Quarter-on-quarter % change. For monthly series: lag(3); for quarterly: lag(1).
          NULL for annual series. Rounded to 4 decimals.

      - name: yoy_change
        description: >
          Year-on-year % change. Lag offset adapts to period_type:
          monthly = lag(12), quarterly = lag(4), annual = lag(1).
          Rounded to 4 decimals.

      # ── Audit ───────────────────────────────────────────────────────────────
      - name: _updated_at
        description: "Timestamp of last dbt build run (NOW())"

  - name: ine_indicators_long
    description: >
      Long-form INE indicator timeseries at parish/concelho/NUTS granularity.
      Distinct from macro_timeseries (national/EU rates+prices+credit) — see
      [[silver-dq-baseline]] "Statistical-source silver topology" for which
      silver answers which question. HPI overlap with macro_timeseries (via
      Eurostat) is intentional: INE 0009201 is PT-native quarterly, Eurostat
      PRC_HPI_Q is EU-aligned. No silver-side filter on indicator_code — bronze
      loader is gated by INE_INDICATORS in ine_config.py.
    columns:
      - name: indicator_long_key
        description: "Surrogate key (ROW_NUMBER)"
        tests: [unique, not_null]
      - name: indicator_code
        description: "INE indicator code (e.g. '0009201' for HPI)"
        tests: [not_null]
      - name: indicator_name
      - name: indicator_category
        description: >
          Pre-computed at bronze load time from INE_INDICATORS[code].category.
          NOT NULL test catches backfill miss after bronze schema migration
          (sprint-09 WS4 locked decision 13).
        tests: [not_null]
      - name: time_period_raw
        description: "Original INE period string (e.g. '2024', '1st Quarter 2009', 'April 2007')"
      - name: time_period_date
        description: >
          Best-effort parse to DATE. Supported formats: YYYY, 'Nst Quarter YYYY',
          '<Month> YYYY'. Other formats (semesters, custom periods) → NULL.
      - name: geographic_code
        description: "INE geocod (TRIM'd from bronze)"
        tests: [not_null]
      - name: geographic_name
      - name: freguesia_code
        description: >
          CAOP-compatible 6-char DTMNFR (can contain letters for freguesia-unions).
          6-char input → pass-through; 9-char input → RIGHT 6 chars (drops NUTS3 prefix);
          else NULL. FK-ready to dim_geography. Use `WHERE freguesia_code IS NOT NULL` to
          filter to freguesia-level rows.
      - name: concelho_code
        description: >
          CAOP-compatible 4-char DTCC, scheme-aware:
          4-char concelho input → as-is; 7-char concelho → RIGHT 4; 6-char freguesia → LEFT 4;
          9-char freguesia → SUBSTRING(4, 4). Else NULL. Use `WHERE concelho_code IS NOT NULL`
          to filter to concelho-or-finer rows.
      - name: dim_3
        description: >
          INE category CODE within Dim3 (indicator-specific dimension — varies
          per indicator: Sex / Housing category / Activity type / etc.).
          Stable convention across indicators: 'T' = total across this dimension.
          Other values are indicator-specific (e.g. for Sex: '1'=Males, '2'=Females;
          for HPI Housing category: 'H1'=Total, 'H11'=New, 'H12'=Existing).
          Filter on this column to slice/aggregate.
      - name: dim_3_label
        description: >
          INE 'displayable' label for the dim_3 category. Inconsistent shape
          across indicators — sometimes a short code ('M', 'F', 'MF'), sometimes
          a full label ('5 - 9 years'). NOT always human-readable. Full
          descriptions ('Males', 'Females', 'Both sexes combined') live in the
          separate pindicaMeta.jsp endpoint (not fetched in v1; deferred to a
          future silver_market.ine_dimensions enrichment).
      - name: dim_4
        description: >
          INE category CODE within Dim4 (indicator-specific dimension — varies
          per indicator: Age group / Tax-residence / Financing purpose / etc.).
          Same 'T' = total convention as dim_3.
      - name: dim_4_label
        description: >
          INE 'displayable' label for the dim_4 category. Same inconsistency
          caveat as dim_3_label.
      - name: dim_5
        description: >
          INE category CODE within Dim5 (indicator-specific dimension — varies
          per indicator: Institutional sector / Project purpose / etc.). Same
          'T' = total convention as dim_3.
      - name: dim_5_label
        description: >
          INE 'displayable' label for the dim_5 category. Same inconsistency
          caveat as dim_3_label.
      - name: value
        description: "Numeric value (already typed in bronze via _parse_valor)"
      - name: ind_string
      - name: sinal_conv
      - name: sinal_conv_desc
      - name: last_updated
      - name: _updated_at
        description: "Timestamp of last dbt build run (NOW())"
