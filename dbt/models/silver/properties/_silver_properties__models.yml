version: 2

models:
  - name: unified_listings_residential
    description: >
      Cross-portal LISTING-grain silver for residential properties (new-construction
      development UNITS only — apartments + houses + studios marketed within a
      project). UNION ALL across the 4 portal-listing staging models
      (idealista_development_units / remax_listings / zome_listings filtered
      to dev-linked / jll_listings). Incremental merge by listing_hash =
      MD5(source || '|' || source_listing_id) — pipeline-safe re-merge, zero
      duplicates, first_seen_date + initial_price_eur preserved via COALESCE.

      NO cross-portal listing-level dedup in v1; same physical unit on 3 portals
      = 3 rows. The unified_development_id FK lets consumers roll up to the
      canonical development for cross-portal comparison.

      Scope correction 2026-06-06: prior version consumed bronze_listings.raw_idealista
      (LEGACY append-only resale catalog, ~21k rows mixing dev + resale). This
      was wrong scope — the cross-portal contract is development-marketed units
      only. Switched idealista source to bronze_listings.idealista_development_units;
      added portal_dev_id + unified_development_id FK across all portals.
    columns:
      - name: listing_hash
        description: "MD5(source || '|' || source_listing_id) — deterministic merge key, never collides across portals"
        tests:
          - unique
          - not_null
      - name: source
        description: "Portal identifier — idealista / remax / zome / jll"
        tests:
          - not_null
          - accepted_values:
              values: ['idealista', 'remax', 'zome', 'jll']
      - name: source_listing_id
        description: "Portal-native listing ID, cast to TEXT"
        tests:
          - not_null
      - name: portal_dev_id
        description: >
          Portal-native development ID this listing belongs to. Sources:
          idealista=development_units.development_id, remax=development_id,
          zome=COALESCE(emid, idemp::TEXT), jll=development_id. All 4 portals
          guarantee this is populated by API design (each portal's listings
          come from a Developments/{id}/Fractions-style traversal). Used to
          resolve unified_development_id via unified_developments.portal_refs.
        tests:
          - not_null
      - name: unified_development_id
        description: >
          FK to unified_developments.unified_development_id — the canonical
          cross-portal development this unit belongs to. Resolved via lateral
          join: ud.portal_refs->source @> to_jsonb(portal_dev_id). NULL when
          the development hasn't been dedup'd into a unified row yet (rare;
          all 4 portals' devs should be in unified_developments by design).
      - name: price_eur
        description: "Asking price in EUR. Rows with NULL or <=0 are filtered out at silver."
      - name: useful_area_m2
        description: "Área Útil (interior livable). Maps per portal: idealista=lot_size_usable, remax=living_area, zome=areautilhab, jll=gross_area (Área Bruta Privativa)."
      - name: gross_area_m2
        description: "Total gross area incl. exterior. Maps per portal: idealista=lot_size, remax=total_area, zome=areabrutaconst, jll=gross_area + balcony+terrace+garden+patio sum from features."
      - name: floor_plan_urls
        description: "TEXT[] of floor plan URLs. JLL: PDFs from blue_prints (egorealestate CDN). Idealista: tagged JPG/WEBP from property_images[i] where property_image_tags[i]='plan'. Zome: aplantsgallery.hres (dedicated floor-plan slot — any entry). RE/MAX: single PDF wrapped, https://i.maxwork.pt/bb prefix (may 404 if session-gated)."
      - name: has_floor_plan
        description: "True iff floor_plan_urls is non-empty"
      - name: floor_plan_count
        description: "array_length(floor_plan_urls, 1) — multi-unit numbered plans common in Idealista (avg 2.2) and Zome (avg 1.9)"
      - name: floor_plan_source
        description: "Which portal supplied the plans — jll_blueprints / idealista_tagged / zome_aplants / remax_path / NULL"
      - name: geo_key
        description: "FK to dim_geography — derived via point-in-polygon on freguesia_geom_pt"
      - name: is_active
        description: "True if last_seen_date is within 3-day grace; flipped to FALSE by post-hook when stale"

  - name: unified_listings_idealista_legacy
    description: >
      [LEGACY] Idealista-only listing silver, parsed from TEXT bronze to typed
      silver with Portuguese labels. Renamed 2026-06-05 from `unified_listings`
      when the cross-portal `unified_listings_residential` shipped. Kept
      alongside the new model for non-breaking consumer migration; downstream
      consumers should migrate to unified_listings_residential at their cadence.
      Will be retired once all consumers have moved.
    columns:
      # ── Identity ────────────────────────────────────────────────────────────
      - name: listing_key
        description: "Surrogate key via ROW_NUMBER — unstable across full-refreshes, use source_listing_id for joins"
        tests:
          - unique
          - not_null

      - name: property_hash
        description: "MD5 hash of source_listing_id + operation_type + 'idealista' — deduplication key across sources"

      - name: source
        description: "Data source identifier, always 'idealista' for now"
        tests:
          - not_null
          - accepted_values:
              values: ['idealista']

      - name: source_listing_id
        description: "Idealista property_id cast to VARCHAR(50) — unique business key for incremental merge"
        tests:
          - unique
          - not_null

      - name: listing_url
        description: "Full Idealista listing URL for manual verification"

      # ── Operation ───────────────────────────────────────────────────────────
      - name: operation_type
        description: "'sale' or 'rent' — parsed from Idealista API operation field"
        tests:
          - not_null
          - accepted_values:
              values: ['sale', 'rent']

      # ── Pricing ─────────────────────────────────────────────────────────────
      - name: price_eur
        description: "Current listing price in EUR. Updated on each scrape via merge"
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 100
              max_value: 50000000

      - name: price_per_sqm_useful
        description: "price_eur / useful_area_m2, rounded to 2 decimals. NULL when useful_area_m2 is 0 or NULL"

      - name: price_per_sqm_gross
        description: "price_eur / gross_area_m2, rounded to 2 decimals. NULL when gross_area_m2 is 0 or NULL"

      - name: initial_price_eur
        description: "Price at first_seen_date. Preserved across incremental merges via COALESCE(existing, current)"

      - name: price_change_count
        description: "Number of price changes detected across scrapes. Incremented when existing.price_eur IS DISTINCT FROM new price"

      # ── Property type (from dim_property_type) ──────────────────────────────
      - name: property_type_key
        description: "FK to dim_property_type — two-pass join: exact match on type+subtype, fallback on type only"
        tests:
          - relationships:
              to: ref('dim_property_type')
              field: property_type_key
              where: "property_type_key IS NOT NULL"

      - name: property_type
        description: "Portuguese property type label (e.g. Apartamento, Moradia) from dim_property_type"
        tests:
          - accepted_values:
              values: ['Apartamento', 'Moradia', 'Moradia Rústica', 'Habitação']
              where: "property_type IS NOT NULL"

      - name: property_subtype
        description: "Portuguese subtype (e.g. Duplex, Geminada, Isolada). NULL when source has no subtype"

      - name: property_type_group
        description: "Broad grouping: Apartamento or Moradia — for high-level market segmentation"
        tests:
          - accepted_values:
              values: ['Apartamento', 'Moradia']
              where: "property_type_group IS NOT NULL"

      - name: typology
        description: "Typology code from property_features JSONB (e.g. T0, T1, T3). Extracted via regex '^T\\d'"

      # ── Physical attributes ─────────────────────────────────────────────────
      - name: useful_area_m2
        description: "Useful (net) area in m². From lot_size field, with fallback to 'm² úteis' in property_features"
        tests:
          - dbt_utils.accepted_range:
              min_value: 1
              max_value: 1000000
              where: "useful_area_m2 IS NOT NULL"

      - name: gross_area_m2
        description: "Gross (built) area in m². From lot_size_usable field, with fallback to 'm² construídos' in property_features"

      - name: num_rooms
        description: "Bedroom count, capped at 15. From bedroom_count or bedrooms_count, whichever is non-null"
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 15
              where: "num_rooms IS NOT NULL"

      - name: num_bathrooms
        description: "Bathroom count, capped at 10. From bathroom_count field"

      - name: floor_number
        description: "Floor number: -2=subsolo, -1=baixo, 0=rés-do-chão/entresolho, 1+=upper floors. Parsed from floor_raw"

      - name: num_floors
        description: "Total floors in building. Extracted from 'X andares' pattern in property_features JSONB"

      - name: construction_year
        description: "Year built. Extracted from 'Construído em YYYY' pattern in property_features JSONB"
        tests:
          - dbt_utils.accepted_range:
              min_value: 1500
              max_value: 2030
              where: "construction_year IS NOT NULL"

      - name: condition
        description: "Property condition in Portuguese: 'Bom estado' (good), 'Novo' (new development), 'Para recuperar' (needs renovation)"
        tests:
          - accepted_values:
              values: ['Bom estado', 'Novo', 'Para recuperar']
              where: "condition IS NOT NULL"

      - name: energy_class
        description: "Energy certificate rating normalized to standard codes: A+, A, B, B-, C, D, E, F, G"
        tests:
          - accepted_values:
              values: ['A+', 'A', 'B', 'B-', 'C', 'D', 'E', 'F', 'G']
              where: "energy_class IS NOT NULL"

      - name: orientation
        description: "Property orientation (e.g. 'Sul, Este'). Extracted from 'Orientação ...' in property_features"

      - name: heating_type
        description: "Heating system description (e.g. 'individual: Elétrico', 'Sem aquecimento'). From property_features"

      # ── Amenity flags ───────────────────────────────────────────────────────
      - name: has_elevator
        description: "TRUE if property_features/equipment contains 'elevador' or 'ascensor'"

      - name: has_parking
        description: "TRUE if features contain 'garagem', 'estacionamento', or 'parking'"

      - name: has_terrace
        description: "TRUE if features contain 'terraço', 'varanda', or 'balcão'"

      - name: has_garden
        description: "TRUE if features contain 'jardim' or 'garden'"

      - name: has_pool
        description: "TRUE if features contain 'piscina' or 'pool'"

      - name: has_ac
        description: "TRUE if features contain 'ar condicionado'"

      - name: has_storage
        description: "TRUE if features contain 'arrecadação'"

      - name: has_wardrobes
        description: "TRUE if features contain 'roupeiros embutidos'"

      - name: is_furnished
        description: "TRUE if features contain 'mobilado' or 'cozinha equipada'"

      - name: is_new_development_combined
        description: "TRUE if Claude Vision detected render images (cv_is_render). CV render detection is the source of truth for new development status"

      # ── Geography ───────────────────────────────────────────────────────────
      - name: geo_key
        description: "FK to dim_geography — assigned via ST_Within spatial join (point-in-polygon). NULL if coordinates fall outside CAOP polygons"
        tests:
          - relationships:
              to: ref('dim_geography')
              field: geo_key
              where: "geo_key IS NOT NULL"

      - name: distrito_code
        description: "2-digit distrito code from dim_geography (e.g. '01' for Aveiro)"

      - name: distrito_name
        description: "Distrito name from dim_geography (e.g. 'Aveiro')"

      - name: concelho_code
        description: "4-digit concelho code from dim_geography (e.g. '0105' for Aveiro municipality)"

      - name: concelho_name
        description: "Concelho/municipality name from dim_geography (e.g. 'Aveiro')"

      - name: freguesia_code
        description: "6-digit freguesia code from dim_geography (e.g. '010503' for Glória e Vera Cruz)"

      - name: freguesia_name
        description: "Freguesia/parish name from dim_geography (e.g. 'Glória e Vera Cruz')"

      - name: address_clean
        description: "Cleaned address: uses Nominatim reverse-geocoded road + house_number when original address lacks street prefix, otherwise keeps address_raw"

      - name: postal_code
        description: "Portuguese postal code from Nominatim reverse geocoding (VARCHAR(10))"
        tests:
          - not_null:
              where: "latitude IS NOT NULL"
              config:
                severity: warn

      - name: latitude
        description: "WGS84 latitude (NUMERIC(10,7)). From Idealista API coordinates"
        tests:
          - dbt_utils.accepted_range:
              min_value: 36.9
              max_value: 42.2
              where: "latitude IS NOT NULL"

      - name: longitude
        description: "WGS84 longitude (NUMERIC(10,7)). From Idealista API coordinates"
        tests:
          - dbt_utils.accepted_range:
              min_value: -9.6
              max_value: -6.1
              where: "longitude IS NOT NULL"

      - name: geom
        description: "PostGIS POINT geometry in SRID 4326 (WGS84). Built from longitude/latitude via ST_MakePoint. GIST-indexed"

      - name: geom_pt
        description: "PostGIS POINT geometry in SRID 3763 (PT-TM06/ETRS89). Transformed from geom for metric distance calculations"

      # ── Computer Vision (from image_classification_dag) ────────────────────
      - name: cv_is_render
        description: "TRUE if Claude Vision detected a 3D render/CGI (not a real photograph)"

      - name: cv_condition
        description: "3-level condition from Claude Vision: needs_renovation, habitable, renovated"
        tests:
          - accepted_values:
              values: ['needs_renovation', 'habitable', 'renovated']
              where: "cv_condition IS NOT NULL"

      - name: cv_condition_confidence
        description: "Claude Vision confidence for condition_label (0.000-1.000)"

      - name: cv_finish_quality
        description: "3-level interior finish quality from Claude Vision: basic, standard, premium"
        tests:
          - accepted_values:
              values: ['basic', 'standard', 'premium']
              where: "cv_finish_quality IS NOT NULL"

      - name: cv_finish_quality_confidence
        description: "Claude Vision confidence for finish_quality (0.000-1.000)"

      - name: cv_model_version
        description: "Claude model used for classification (e.g. claude-sonnet-4-20250514)"

      - name: cv_classified_at
        description: "Timestamp when Claude Vision classified this listing"

      # ── Lifecycle (SCD) ─────────────────────────────────────────────────────
      - name: first_seen_date
        description: "Date listing first appeared in scrape data. Preserved across incremental merges"
        tests:
          - not_null

      - name: last_seen_date
        description: "Most recent scrape_date for this listing. Updated on each merge"
        tests:
          - not_null

      - name: listing_age_days
        description: "Days between first_seen_date and last_seen_date. Computed as difference on merge"

      - name: is_active
        description: "TRUE if listing is active. Set FALSE when listing_status != 'active' or not seen for >3 days (post_hook)"
        tests:
          - not_null

      # ── Audit ───────────────────────────────────────────────────────────────
      - name: _created_at
        description: "Timestamp when the row was first inserted. Preserved across merges via COALESCE"

      - name: _updated_at
        description: "Timestamp of last merge update. Set to NOW() on every run"

  - name: floor_plan_rooms
    description: >
      One row per room per floor plan image. Unnests the rooms JSONB from
      stg_floor_plans, drops NULL areas, and maps room names to standardized
      categories. Join to unified_listings via property_id = source_listing_id
      for price, geography, and property attributes.
    columns:
      - name: property_id
        description: "Idealista property_id — join to unified_listings.source_listing_id"
        tests:
          - not_null

      - name: typology
        description: "Typology extracted by CV from the floor plan image (e.g. T0, T1, T3). May differ from Idealista typology"

      - name: floor_label
        description: "Floor label extracted by CV (e.g. 'Piso 1', 'RC', 'Cave'). NULL if not identifiable"

      - name: total_area_m2
        description: "Total area in m² as read from the floor plan image. May include garages/balconies unlike Idealista useful_area_m2"

      - name: num_bedrooms
        description: "Bedroom count extracted by CV from this floor plan image"

      - name: num_bathrooms
        description: "Bathroom count extracted by CV from this floor plan image"

      - name: has_terrace
        description: "TRUE if CV detected a terrace/balcony in this floor plan"

      - name: terrace_area_m2
        description: "Terrace area in m² if extracted from the plan"

      - name: extraction_confidence
        description: "CV confidence score for the floor plan extraction (0.000-1.000)"

      - name: room_name
        description: "Original room name from CV extraction (e.g. quarto_1, sala, wc_2)"

      - name: room_category
        description: "Standardized room category: bedroom, bathroom, living_room, kitchen, hallway, balcony, storage, garage, office, other"
        tests:
          - accepted_values:
              values: ['bedroom', 'bathroom', 'living_room', 'kitchen', 'hallway', 'balcony', 'storage', 'garage', 'office', 'other']

      - name: room_area_m2
        description: "Room area in m² as extracted by CV from the floor plan. NULL areas are excluded"
        tests:
          - not_null

  - name: unified_developments
    description: >
      One row per marketed real-estate development, de-duplicated across the 4
      listing portals (idealista, RE/MAX, Zome, JLL). Sprint-09 Slice B-prime.
      Relocated 2026-06-05 from silver_regulatory → silver_properties (it models
      marketed properties, not regulation); pairs with unified_listings.

      Portal dedup is name-driven: project names are normalized (deaccent;
      strip typology codes T1/T2/T1+1, boilerplate words empreendimento/edifício/
      the, and a trailing concelho name; punctuation → space), tokenized, and two
      listings are linked when their word-sets have Jaccard overlap >= 0.6 AND
      they share a concelho. A 1km distance ceiling is a guardrail (skipped when
      a coord is missing). Connected components over those links produce one
      development per component. Proximity-first (DBSCAN) was rejected: portal
      coordinates disagree by 200-300m+ for the same development.

      Geometry hierarchy: the development takes geom + concelho + parish from the
      highest-priority portal present that has coordinates: JLL > Zome > RE/MAX
      > idealista. geo_key resolved by point-in-polygon of the unified geom
      against dim_geography.freguesia_geom_pt.

      SCE is intentionally NOT merged here. SCE buildings (certified physical
      buildings) and portal developments (marketed projects) are different
      concepts with no shared identifier and incompatible geocoding precision.
      Atlas Inspector / fn_assess_polygon query unified_developments AND
      silver_sce_buildings side-by-side ("marketed developments here + certified
      buildings here") rather than forcing them into one row.

      portal_unit_counts (JSONB) exposes every portal's reported count without
      picking an "authoritative" one — each portal's count has different semantics
      (idealista = listed-units subset per the 2026-05-22 facade audit; Zome =
      inventory; JLL = total fractions; RE/MAX = listings at RE/MAX). Consumers
      read the breakdown and choose.
    columns:
      # ── Identity ───────────────────────────────────────────────────────
      - name: unified_development_id
        description: "Surrogate BIGINT key produced by ROW_NUMBER over the result. Stable within a build, NOT across rebuilds. The stable identity of a development is the content of portal_refs."
        tests:
          - unique
          - not_null
      # ── Geometry (dual CRS, both GIST-indexed) ────────────────────────
      - name: unified_geom_3763
        description: "Development centroid in EPSG:3763 (PT-TM06). Taken from the highest-priority portal with coordinates (JLL > Zome > RE/MAX > idealista) — ST_Centroid over that portal's member geoms."
        tests:
          - not_null
      - name: unified_geom_4326
        description: "Same centroid in EPSG:4326 (WGS84). For Kepler.gl / Leaflet display in the Inspector."
        tests:
          - not_null
      # ── Administrative ────────────────────────────────────────────────
      - name: geo_key
        description: "FK to dim_geography (the freguesia containing unified_geom_3763). NULL when the point falls outside every current freguesia polygon (~1% of rows — typically offshore/boundary edge cases)."
      - name: concelho
        description: "Concelho name — COALESCE(dim_geography.concelho_name resolved via point-in-polygon, portal text MODE)."
      - name: parish
        description: "Freguesia name — COALESCE(dim_geography.freguesia_name resolved via point-in-polygon, portal text MODE)."
      - name: dominant_name
        description: "Most common canonical_name across the development's portal members (MODE over non-null names). NULL only if every contributing portal listed the dev without a name."
      # ── Counts + provenance ──────────────────────────────────────────
      - name: portal_unit_counts
        description: "JSONB {portal: unit_count} — each portal's reported total_units. No authoritative pick: idealista = listed-units subset, Zome = inventory, JLL = total_fractions, RE/MAX = listings at RE/MAX. Consumer reads the breakdown."
        tests:
          - not_null
      - name: n_portal_contributors
        description: "Number of distinct portals that contributed to this development (1-4)."
        tests:
          - not_null
      - name: portal_refs
        description: "JSONB {portal: [portal_dev_id, ...]} — every contributing portal record. The stable identity of the development; the surrogate id is not."
        tests:
          - not_null
      - name: _built_at
        description: "Timestamp the table was built (NOW() at SELECT time)."
        tests:
          - not_null
