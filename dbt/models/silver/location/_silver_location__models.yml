version: 2

models:
  - name: pois
    description: >
      Points of interest from OSM (point + polygon features), classified into 10 unified categories.
      ~304K rows from Geofabrik Portugal gis_osm_pois + gis_osm_pois_a layers.
      Polygons converted to interior points via ST_PointOnSurface.
      Dual-projection geometries (4326 + 3763), spatial join to dim_geography for geo_key.
      Designed for multi-source: source='osm' now, future Overture Maps data via source='overture'.
    columns:
      - name: poi_key
        description: "Surrogate key (BIGINT) via ROW_NUMBER ordered by osm_id"
        tests:
          - unique
          - not_null
      - name: source
        description: "Data source identifier: 'osm' (future: 'overture')"
        tests:
          - not_null
      - name: source_id
        description: "Original feature ID from source (OSM osm_id cast to TEXT)"
        tests:
          - not_null
      - name: name
        description: "POI name from source (may be NULL for unnamed features)"
      - name: category
        description: >
          Unified category: food, retail, health, education, finance, green_space,
          leisure, public_service, tourism, other
        tests:
          - not_null
          - accepted_values:
              values: ['food', 'retail', 'health', 'education', 'finance', 'green_space', 'leisure', 'public_service', 'tourism', 'other']
      - name: source_category
        description: "Original category from source (OSM fclass, e.g. restaurant, pharmacy, school)"
        tests:
          - not_null
      - name: geo_key
        description: "FK to dim_geography via ST_Within spatial join. NULL for POIs outside mainland freguesias"
      - name: distrito_code
        description: "2-digit distrito code from dim_geography spatial join (e.g. '11' for Lisboa)"
      - name: distrito_name
        description: "Distrito name from dim_geography spatial join (e.g. 'Lisboa')"
      - name: concelho_code
        description: "4-digit concelho code from dim_geography spatial join (e.g. '1106' for Lisboa)"
      - name: concelho_name
        description: "Concelho/municipality name from dim_geography spatial join (e.g. 'Lisboa')"
      - name: freguesia_name
        description: "Freguesia/parish name from dim_geography spatial join"
      - name: latitude
        description: "WGS84 latitude extracted via ST_Y(geom)"
        tests:
          - not_null
      - name: longitude
        description: "WGS84 longitude extracted via ST_X(geom)"
        tests:
          - not_null
      - name: geom
        description: "PostGIS POINT in SRID 4326 (WGS84). GIST-indexed"
        tests:
          - not_null
      - name: geom_pt
        description: "PostGIS POINT in SRID 3763 (PT-TM06/ETRS89). GIST-indexed for metric distance calculations"
        tests:
          - not_null
      - name: _updated_at
        description: "Timestamp of last dbt build run"

  - name: transport_stops
    description: >
      OSM transport stops classified by mode (~50K rows).
      Combines point features (49K) and polygon features (1.1K, converted via ST_PointOnSurface).
      fclass mapped to stop_type (rail, bus, tram, ferry, taxi, air).
      Dual-projection geometries (4326 + 3763), spatial join to dim_geography for geo_key.
      Source: Geofabrik Portugal gis_osm_transport_free + gis_osm_transport_a_free layers.
    columns:
      - name: stop_key
        description: "Surrogate key via ROW_NUMBER ordered by osm_id"
        tests:
          - unique
          - not_null
      - name: source
        description: "Data source identifier: 'osm' (future: 'gtfs', 'overture')"
        tests:
          - not_null
      - name: source_id
        description: "Original OSM ID (TEXT) for enrichment joins back to source data"
        tests:
          - not_null
      - name: stop_name
        description: "Transport stop name from OSM (may be NULL for unnamed stops)"
      - name: stop_type
        description: "Transport mode: rail, bus, tram, metro, ferry, taxi, air — mapped from OSM fclass"
        tests:
          - not_null
          - accepted_values:
              values: ['rail', 'bus', 'tram', 'metro', 'ferry', 'taxi', 'air', 'other']
      - name: operator
        description: "NULL — not available in Geofabrik extract. Placeholder for future enrichment"
      - name: is_interchange
        description: "NULL — placeholder for future multi-modal hub classification"
      - name: geo_key
        description: "FK to dim_geography via ST_Within spatial join. NULL for stops outside mainland freguesias"
      - name: distrito_code
        description: "2-digit distrito code from dim_geography (e.g. '11' for Lisboa)"
      - name: distrito_name
        description: "Distrito name (e.g. 'Lisboa')"
      - name: concelho_code
        description: "4-digit concelho code from dim_geography (e.g. '1106' for Lisboa)"
      - name: concelho_name
        description: "Concelho/municipality name (e.g. 'Lisboa')"
      - name: freguesia_name
        description: "Freguesia/parish name from dim_geography"
      - name: latitude
        description: "WGS84 latitude extracted via ST_Y(geom)"
        tests:
          - not_null
      - name: longitude
        description: "WGS84 longitude extracted via ST_X(geom)"
        tests:
          - not_null
      - name: geom
        description: "PostGIS POINT in SRID 4326 (WGS84). GIST-indexed"
        tests:
          - not_null
      - name: geom_pt
        description: "PostGIS POINT in SRID 3763 (PT-TM06/ETRS89). GIST-indexed for metric distance calculations"
        tests:
          - not_null
      - name: is_planned
        description: "Always FALSE — OSM data represents existing infrastructure"
      - name: _updated_at
        description: "Timestamp of last dbt build run"
