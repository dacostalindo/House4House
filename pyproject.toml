[tool.uv.workspace]
members = ["apps", "pipelines"]

[dependency-groups]
dev = [
    "ruff>=0.7.0",
    "pytest>=8.0",
    "pytest-mock>=3.12",
    "pre-commit>=3.7",
]

[tool.ruff]
line-length = 100
target-version = "py312"
extend-exclude = [
    "dbt/dbt_packages/**",
    "data/**",
    "warehouse/init/**",
    "scripts/*.har",
    "**/.venv/**",
]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "RUF"]
ignore = [
    "E501",
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-q"
