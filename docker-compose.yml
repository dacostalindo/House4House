# House4House data platform
# Services: Airflow (webserver + scheduler) + MinIO + PostGIS warehouse + OSRM routing + Nominatim geocoding
#
# Start:  docker compose up -d
# Stop:   docker compose down
# Logs:   docker compose logs -f airflow-webserver
# UI:     http://localhost:8080  (Airflow)
#         http://localhost:9001  (MinIO console)

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:${POSTGRES_PASSWORD}@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    # Make the pipelines package importable inside all Airflow containers
    PYTHONPATH: /opt/airflow/dags
    # dbt needs warehouse connection as OS env vars (not Airflow Variables)
    DBT_PROFILES_DIR: /opt/airflow/dbt
    WAREHOUSE_HOST: warehouse
    WAREHOUSE_PORT: "5432"
    WAREHOUSE_DB: house4house
    WAREHOUSE_USER: warehouse
    WAREHOUSE_PASSWORD: ${WAREHOUSE_PASSWORD}
  volumes:
    - ./pipelines:/opt/airflow/dags/pipelines
    - ./dbt:/opt/airflow/dbt
    - /var/run/docker.sock:/var/run/docker.sock
    - osrm_data:/osrm-data
  depends_on:
    postgres:
      condition: service_healthy
    warehouse:
      condition: service_healthy
  restart: unless-stopped

services:

  # ── Airflow metadata database ──────────────────────────────────────────────
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5
    restart: unless-stopped

  # ── Data warehouse (PostGIS) ───────────────────────────────────────────────
  warehouse:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: warehouse
      POSTGRES_PASSWORD: ${WAREHOUSE_PASSWORD}
      POSTGRES_DB: house4house
    volumes:
      - warehouse_data:/var/lib/postgresql/data
      - ./warehouse/init:/docker-entrypoint-initdb.d
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "warehouse"]
      interval: 5s
      retries: 5
    restart: unless-stopped

  # ── Airflow init (runs once, then exits) ───────────────────────────────────
  airflow-init:
    <<: *airflow-common
    command: |
      bash -c "
        airflow db migrate &&
        airflow users create --username ${AIRFLOW_ADMIN_USER} --password ${AIRFLOW_ADMIN_PASSWORD} --firstname Admin --lastname User --role Admin --email admin@local.dev || true &&
        airflow variables set MINIO_ENDPOINT minio:9000 &&
        airflow variables set MINIO_ACCESS_KEY ${MINIO_ROOT_USER} &&
        airflow variables set MINIO_SECRET_KEY ${MINIO_ROOT_PASSWORD} &&
        airflow variables set WAREHOUSE_HOST warehouse &&
        airflow variables set WAREHOUSE_PORT 5432 &&
        airflow variables set WAREHOUSE_DB house4house &&
        airflow variables set WAREHOUSE_USER warehouse &&
        airflow variables set WAREHOUSE_PASSWORD ${WAREHOUSE_PASSWORD} &&
        airflow variables set OSRM_CAR_URL http://osrm-car:5000 &&
        airflow variables set OSRM_WALKING_URL http://osrm-walking:5000 &&
        airflow variables set OSRM_CYCLING_URL http://osrm-cycling:5000 &&
        airflow variables set NOMINATIM_URL http://nominatim:8080 &&
        airflow variables set ZENROWS_API_KEY ${ZENROWS_API_KEY} &&
        echo 'All Airflow variables set'
      "
    restart: "no"

  # ── Airflow webserver ──────────────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 10s
      retries: 5

  # ── Airflow scheduler ──────────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    ports:
      - "8089:8089"   # dbt docs serve

  # ── MinIO (S3-compatible object storage) ───────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:9000/minio/health/live"]
      interval: 10s
      retries: 3
    restart: unless-stopped

  # ── Nominatim Geocoder ──────────────────────────────────────────────────
  nominatim:
    image: mediagis/nominatim:4.4
    environment:
      PBF_URL: https://download.geofabrik.de/europe/portugal-latest.osm.pbf
      REPLICATION_URL: https://download.geofabrik.de/europe/portugal-updates/
      NOMINATIM_PASSWORD: nominatim2025
      IMPORT_STYLE: full
    volumes:
      - nominatim_data:/var/lib/postgresql/14/main
    ports:
      - "8088:8080"
    shm_size: 1g
    restart: unless-stopped

  # ── OSRM Routing (Car) ──────────────────────────────────────────────────
  osrm-car:
    image: osrm/osrm-backend:latest
    command: osrm-routed --algorithm ch /data/car/portugal-latest.osrm
    volumes:
      - osrm_data:/data
    ports:
      - "5050:5000"
    restart: unless-stopped

  # ── OSRM Routing (Walking) ────────────────────────────────────────────
  osrm-walking:
    image: osrm/osrm-backend:latest
    command: osrm-routed --algorithm ch --port 5000 /data/walking/portugal-latest.osrm
    volumes:
      - osrm_data:/data
    ports:
      - "5051:5000"
    restart: unless-stopped

  # ── OSRM Routing (Cycling) ────────────────────────────────────────────
  osrm-cycling:
    image: osrm/osrm-backend:latest
    command: osrm-routed --algorithm ch --port 5000 /data/cycling/portugal-latest.osrm
    volumes:
      - osrm_data:/data
    ports:
      - "5052:5000"
    restart: unless-stopped

volumes:
  postgres_data:
  warehouse_data:
  minio_data:
  osrm_data:
  nominatim_data:
